<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión | Baboons</title>
    <link rel="icon" type="image/png" href="/static/img/logo.png">
    <meta name="theme-color" content="#222222">
    <link rel="manifest" href="/manifest.json">

    <!-- 🧹 LIMPIEZA DE CACHÉ / SERVICE WORKER (CRÍTICO) -->
    <script src="{{ url_for('static', filename='js/sw-cleaner.js') }}?v={{ range(1, 99999) | random }}"></script>

    <!-- <script src="/static/js/main.js?v=1.2.3" type="module"></script> -->
    <script type="module"
        src="{{ url_for('static', filename='js/main.js') }}?v={{ range(1, 99999) | random }}&force=SYSTEM_RESET_V2"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jwt-decode@3.1.2/build/jwt-decode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.0.9/dist/html5-qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Configuración global para PDF.js
        window.pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}?v={{ range(1, 99999) | random }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app_types.css') }}?v={{ range(1, 99999) | random }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login_secure.css') }}?v={{ range(1, 99999) | random }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/proveedores.css') }}?v={{ range(1, 99999) | random }}">

    <!-- Leaflet CSS & JS (Fork con rotación integrada) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/leaflet-rotate-map@0.3.1/leaflet-src.js"></script>

    <!-- Leaflet Draw -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <!-- 🍹 KDS STYLING (CRÍTICO PARA PRODUCCIÓN) -->
    <link rel="stylesheet" href="/static/css/kds.css?v={{ range(1, 99999) | random }}">

</head>

<body>
    <div id="subscription-banner"
        style="display: none; padding: 10px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 9999;">
    </div>
    <div id="global-loader" class="loader-overlay">
        <div class="loader-spinner"></div>
    </div>
    <div id="notification-container"></div>

    <header>
        <div class="logo-container">
            <img src="/static/img/logo.png" alt="Baboons Logo" id="header-logo">
        </div>
        <button id="hamburger-btn" class="hamburger-btn" onclick="toggleMenu()">☰</button>

        <div class="nav-container">
            <nav id="main-nav">
                <!-- El menú se genera dinámicamente en main.js -> actualizarVisibilidadMenu() -->
                <div id="nav-modules-container" style="display: contents;"></div>
                <a href="#" id="auth-link" class="auth-btn"></a>
            </nav>
        </div>
    </header>


    <div id="business-selector-bar" style="display: none;">
        <label for="selector-negocio">NEGOCIO ACTIVO:</label>
        <select id="selector-negocio"></select>
    </div>

    <!-- 📢 CONTENEDOR ANUNCIO GLOBAL -->
    <div id="announcement-global" class="alert alert-info alert-dismissible m-3 shadow-sm border-0 bg-white"
        style="display: none; border-left: 4px solid #17a2b8 !important;" role="alert">
        <div class="d-flex align-items-center w-100">
            <i class="fas fa-bullhorn text-info fs-4 me-3"></i>
            <div class="flex-grow-1">
                <span class="fw-bold text-dark d-block">Aviso Importante</span>
                <span id="announcement-text" class="text-muted small"></span>
            </div>
            <button type="button" class="btn-close" aria-label="Close"
                onclick="window.dismissGlobalAnnouncement()"></button>
        </div>
    </div>

    <main id="content-area">
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
