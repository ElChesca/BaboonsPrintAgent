<div class="seccion-contenido-dinamico animate__animated animate__fadeIn p-3">
    <!-- Header Premium -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 fw-bold mb-0 text-slate-800">Historial de Ingresos</h1>
            <p class="text-muted small">Consulta de mercadería recibida y facturación de proveedores</p>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary px-4 shadow-sm" onclick="window.location.hash = '#ingresos'">
                <i class="fas fa-plus me-2 text-primary"></i>Nuevo Ingreso
            </button>
            <button class="btn btn-white shadow-sm px-3" onclick="window.history.back()">
                <i class="fas fa-arrow-left"></i>
            </button>
        </div>
    </div>

    <!-- Filtros -->
    <div class="baboons-card mb-4">
        <div class="card-body p-3">
            <div class="row align-items-center g-3">
                <div class="col-md-4">
                    <label class="micro-label fw-bold mb-1">FILTRAR POR PROVEEDOR</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-user-tie text-muted"></i></span>
                        <select id="filtro-proveedor-ingresos" class="form-select border-start-0">
                            <option value="">-- Todos los proveedores --</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Tabla de Historial -->
    <div class="baboons-card animate__animated animate__fadeInUp">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table id="tabla-historial-ingresos" class="table table-hover align-middle mb-0">
                    <thead class="bg-slate-50">
                        <tr>
                            <th class="ps-4 py-3 text-uppercase small fw-bold text-muted">Fecha</th>
                            <th class="py-3 text-uppercase small fw-bold text-muted">Proveedor</th>
                            <th class="py-3 text-uppercase small fw-bold text-muted">Factura Nro.</th>
                            <th class="py-3 text-uppercase small fw-bold text-muted">Referencia</th>
                            <th class="py-3 text-uppercase small fw-bold text-muted text-end">Total</th>
                            <th class="py-3 text-uppercase small fw-bold text-muted text-end">Pagado</th>
                            <th class="py-3 text-uppercase small fw-bold text-muted text-end">Pendiente</th>
                            <th class="py-3 text-uppercase small fw-bold text-muted text-center">Estado</th>
                            <th class="pe-4 py-3 text-uppercase small fw-bold text-muted text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Llenado por historial_ingresos.js -->
                        <tr>
                            <td colspan="9" class="text-center py-5">
                                <div class="spinner-border text-primary spinner-border-sm me-2" role="status"></div>
                                Cargando historial...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal para Detalles -->
    <div class="baboons-modal" id="modal-detalles-ingreso" style="display: none;">
        <div class="baboons-modal-content large">
            <div class="baboons-modal-header">
                <div class="d-flex align-items-center">
                    <i class="fas fa-file-invoice me-3 fa-lg"></i>
                    <div>
                        <h3 class="mb-0">Detalles del Ingreso</h3>
                        <p class="text-white-50 small mb-0">Listado de productos y costos por comprobante</p>
                    </div>
                </div>
                <span id="close-detalles-ingreso" class="close-button">&times;</span>
            </div>
            <div class="modal-body" id="contenido-detalles-ingreso">
                <!-- Se carga vía JS -->
            </div>
            <div class="form-actions p-3 bg-light d-flex justify-content-between align-items-center">
                <button type="button" id="btn-imprimir-ingreso-modal" class="btn btn-outline-danger px-4 shadow-sm fw-bold">
                    <i class="fas fa-file-pdf me-2"></i>Imprimir PDF
                </button>
                <button type="button" class="btn btn-primary px-4 shadow-sm fw-bold" onclick="document.getElementById('modal-detalles-ingreso').style.display='none'">
                    Cerrar
                </button>
            </div>
        </div>
    </div>
</div>
