<link rel="stylesheet" href="/static/css/unidades_medida.css">

<h2>📏 Gestión de Unidades de Medida</h2>

<div class="gestion-unidades-grid">
    
    <div class="card">
        <h3 id="form-unidad-titulo">Añadir Nueva Unidad</h3>
        <form id="form-unidad">
            <input type="hidden" id="unidad-id">
            
            <div class="form-group">
                <label for="unidad-nombre">Nombre Completo:</label>
                <input type="text" id="unidad-nombre" placeholder="Ej: Kilogramos" required>
            </div>
            
            <div class="form-group">
                <label for="unidad-abreviatura">Abreviatura:</label>
                <input type="text" id="unidad-abreviatura" placeholder="Ej: kg" required>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn-primary">Guardar</button>
                <button type="button" id="btn-cancelar-edicion" class="btn-secondary" style="display: none;">Cancelar</button>
            </div>
        </form>
    </div>

    <div class="card">
        <h3>Unidades Existentes</h3>
        <div class="tabla-contenedor">
            <table class="tabla-bonita" id="tabla-unidades">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Abreviatura</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </div>

</div>
