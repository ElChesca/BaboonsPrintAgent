<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Multinegocio Baboons</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Unified CSS -->
    <link rel="stylesheet" href="/static/css/global.css">
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body class="login-page">
    <div class="login-background">
        <div class="glass-circle circle-1"></div>
        <div class="glass-circle circle-2"></div>
    </div>

    <div class="login-page-wrapper">
        <div class="login-card-container">
            <div class="login-brand">
                <img src="/static/img/logo.png" alt="Baboons Logo" id="login-logo" onerror="this.src='/static/img/logo_placeholder.png'; this.onerror=null;">
                <h1>Multinegocio <span>Baboons</span></h1>
                <p class="brand-tagline">Gestión Inteligente para tu Negocio</p>
            </div>

            <div class="login-form-box">
                <h2>Bienvenido</h2>
                <p class="login-subtitle">Ingresa tus credenciales para continuar</p>
                
                <div id="login-error-message" class="alert alert-danger" style="display: none; margin-bottom: 1rem; border-radius: 8px; font-size: 0.9rem;"></div>
                <form id="login-form" method="POST" action="javascript:void(0);">
                    <div class="form-group">
                        <label for="email">Corre Electrónico</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required autocomplete="username">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                            <button type="button" id="toggle-password" class="toggle-btn">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="remember">
                            <span>Recordarme</span>
                        </label>
                    </div>
                    
                    <button type="submit" class="login-btn">
                        <span>Ingresar al Sistema</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </form>
            </div>
            
            <div class="login-footer">
                <p>&copy; 2024 Baboons ERP. Todos los derechos reservados.</p>
        </div>
    </div>
</body>
</html>
