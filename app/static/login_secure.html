<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Baboons ERP</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="/static/css/global.css">
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body class="login-page-light">
    <div class="login-container">
        <!-- Panel Lateral (Branding) -->
        <div class="branding-side">
            <div class="branding-content">
                <img src="/static/img/logo.png" alt="Baboons Logo" class="brand-logo">
                <h1 class="brand-title">Multinegocio <br><span>Baboons</span></h1>
                <p class="brand-subtitle">Gestión inteligente para tu empresa.</p>
                
                <div class="sector-pills">
                    <span>Distribución</span>
                    <span class="dot">•</span>
                    <span>Restó</span>
                    <span class="dot">•</span>
                    <span>Retail</span>
                </div>
            </div>
        </div>

        <!-- Panel Formulario -->
        <div class="form-side">
            <div class="login-card">
                <div class="login-header">
                    <h2>Bienvenido</h2>
                    <p>Introduce tus datos para acceder</p>
                </div>

                <div id="login-error-message" class="alert-error" style="display: none;"></div>

                <form id="login-form">
                    <div class="input-group">
                        <label for="email">Correo Electrónico</label>
                        <div class="input-field">
                            <i class="far fa-envelope"></i>
                            <input type="email" id="email" name="email" placeholder="nombre@ejemplo.com" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <div class="input-field">
                            <i class="far fa-lock"></i>
                            <input type="password" id="password" name="password" placeholder="••••••••" required>
                            <button type="button" id="toggle-password" class="view-pass">
                                <i class="far fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-login">
                        Ingresar al Sistema
                    </button>
                </form>

                <div class="login-footer">
                    <p>&copy; 2024 Baboons ERP. Todos los derechos reservados.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Toggle Password Visibility
        document.getElementById('toggle-password')?.addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // Login Logic
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const errorMessage = document.getElementById('login-error-message');
            errorMessage.style.display = 'none';

            const formData = new URLSearchParams(new FormData(this));

            fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            })
            .then(response => {
                if(response.redirected) {
                    window.location.href = response.url;
                } else if (!response.ok) {
                    return response.json();
                } else {
                    window.location.href = '/'; 
                }
            })
            .then(data => {
                if(data && data.error) {
                    errorMessage.textContent = data.error;
                    errorMessage.style.display = 'block';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                errorMessage.textContent = 'Ocurrió un error inesperado. Reintenta.';
                errorMessage.style.display = 'block';
            });
        });
    </script>
</body>
</html>
