<div class="card">
    <h2>Gestión de Usuarios</h2>
    <table id="user-list" class="table">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Email</th>
                <th>Rol</th>
                <th>Negocios Asignados</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
</div>

<div class="card">
    <h2>Crear Nuevo Usuario</h2>
    <form id="form-add-user">
        <input type="text" id="nombre" placeholder="Nombre completo" required>
        <input type="email" id="email" placeholder="Correo electrónico" required>
        <input type="password" id="password" placeholder="Contraseña" required>
        <select id="rol" required>
            <option value="operador">Operador</option>
            <option value="admin">Administrador</option>
        </select>
        <button type="submit">Crear Usuario</button>
        <div id="add-user-message"></div>
    </form>
</div>

<div id="edit-user-modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="document.getElementById('edit-user-modal').style.display='none'">&times;</span>
        <h3>Editar Usuario</h3>
        <form id="form-edit-user">
            <input type="hidden" id="edit-user-id">
            <p><strong>Usuario:</strong> <span id="edit-user-name"></span></p>
            <label for="edit-rol">Rol:</label>
            <select id="edit-rol" required>
                <option value="operador">Operador</option>
                <option value="admin">Administrador</option>
            </select>
            
            <div class="form-group">
                <label for="user-negocios">Asignar a Negocios:</label>
                <select id="user-negocios" multiple>
                    </select>
                <small>Mantén presionada la tecla Ctrl (o Cmd en Mac) para seleccionar varios.</small>
            </div>
            
            <button type="submit">Guardar Cambios</button>
        </form>
    </div>
</div>

    // La lógica estará en index.html
</script>
