<div class="container-grid">
    <div class="card">
        <h2>Listado de Productos</h2>        
        <div style="margin-bottom: 15px;">
            <input type="text" id="buscador-productos" placeholder="Buscar por nombre..." style="width: calc(100% - 22px); padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
        </div>
        <table id="tabla-productos">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>SKU</th> <th>Proveedor</th> <th>Categoría</th>
                <th>Stock</th>
                <th>Precio Venta</th>
                <th>Costo</th>
                <th>Stock Mín.</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="card">
        <h2>Añadir Nuevo Producto</h2>
        <form id="form-add-producto" novalidate>
            <label for="nombre">Nombre del Producto:</label>
            <input type="text" id="nombre" name="nombre">
            <label for="stock">Stock Inicial:</label>
            <input type="number" id="stock" name="stock" step="0.01">
            <label for="precio_venta">Precio de Venta:</label>
            <input type="number" id="precio_venta" name="precio_venta" step="0.01">
            <div class="form-group">
                <label for="producto-stock-minimo">Stock Mínimo (Umbral):</label>
                <input type="number" id="producto-stock-minimo" placeholder="Ej: 5" step="1" min="0">
            </div>
            <div class="form-group">
                <label for="proveedor_id">Proveedor:</label>
                <select id="proveedor_id"></select>
            </div>
            <div class="form-group">
                <label for="sku">SKU (Cód. Interno):</label>
                <input type="text" id="sku">
            </div>
            <div class="form-group">
                <label for="codigo_barras">Código de Barras:</label>
                <input type="text" id="codigo_barras">
            </div>
            <label for="unidad_medida">Unidad de Medida:</label>
                <select id="unidad_medida" name="unidad_medida">
                    </select>

                <div class="form-group">
                    <label for="edit-unidad_medida">Unidad de Medida:</label>
                    <select id="edit-unidad_medida" name="unidad_medida"></select>
                </div>
            <label for="categoria_id">Categoría:</label>
                <select id="categoria_id" name="categoria_id">
                    <option value="">Sin categoría</option>
                </select>
            <label for="precio-costo-add">Precio de Costo (Admin):</label>
            <input type="number" id="precio-costo-add" name="precio_costo" step="0.01">
            
            <button type="submit">Añadir Producto</button>
            <div id="mensaje-respuesta"></div>
        </form>
    </div>
</div>
<div id="edit-product-modal" class="modal">
    <div class="modal-content">
        <span class="close-button" onclick="document.getElementById('edit-product-modal').style.display='none'">&times;</span>
        
        <form id="form-edit-producto">
            <h3>Editar Producto</h3>
            <input type="hidden" id="edit-producto-id">

            <div class="form-group">
                <label for="edit-nombre">Nombre del Producto:</label>
                <input type="text" id="edit-nombre" required>
            </div>
            
            <div class="form-group">
                <label for="edit-sku">SKU (Cód. Interno):</label>
                <input type="text" id="edit-sku">
            </div>

            <div class="form-group">
                <label for="edit-codigo_barras">Código de Barras:</label>
                <input type="text" id="edit-codigo_barras">
            </div>

            <div class="form-group">
                <label for="edit-proveedor_id">Proveedor:</label>
                <select id="edit-proveedor_id"></select>
            </div>

            <div class="form-group">
                <label for="edit-categoria_id">Categoría:</label>
                <select id="edit-categoria_id"></select>
            </div>

            <div class="form-group">
                <label for="edit-stock">Stock:</label>
                <input type="number" id="edit-stock" step="any">
            </div>

            <div class="form-group">
                <label for="edit-producto-stock-minimo">Stock Mínimo (Umbral):</label>
                <input type="number" id="edit-producto-stock-minimo" step="1" min="0">
            </div>

            <div class="form-group">
                <label for="edit-precio-venta">Precio de Venta:</label>
                <input type="number" id="edit-precio-venta" step="0.01">
            </div>

            <div class="form-group">
                <label for="edit-precio-costo">Precio de Costo (Admin):</label>
                <input type="number" id="edit-precio-costo" step="0.01">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>
