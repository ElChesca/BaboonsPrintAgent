<div class="card">
    <div class="factura-header">
        <div>
            <h2 id="factura-titulo">Facturar Venta</h2>
            <p><strong>Fecha:</strong> <span id="factura-fecha"></span></p>
        </div>
        <div>
            <h3>Cliente</h3>
            <p id="factura-cliente-nombre"></p>
            <p id="factura-cliente-doc"></p>
        </div>
    </div>

    <div class="tabla-contenedor">
        <table id="tabla-factura-items" class="tabla-bonita">
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Precio Unit.</th>
                    <th>Subtotal</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <div class="factura-footer">
        <div class="observaciones-panel">
            <h4>Observaciones de la Venta</h4>
            <p id="factura-observaciones"></p>
        </div>
        <div class="totales-panel">
            <div class="total-row"><span>Subtotal:</span><span id="factura-subtotal">$0.00</span></div>
            <div class="total-row input-row">
                <label for="factura-descuento">Descuento (%):</label>
                <input type="number" id="factura-descuento" value="0" step="0.01">
            </div>
            <hr>
            <div class="total-row final-total">
                <strong>TOTAL:</strong>
                <strong id="factura-total">$0.00</strong>
            </div>
        </div>
    </div>

    <div class="confirmacion-panel">
        <div class="form-group">
            <label for="factura-tipo-comprobante">Tipo de Comprobante:</label>
            <select id="factura-tipo-comprobante">
                <option value="B">Factura B</option>
                <option value="A">Factura A</option>
                <option value="M">Factura M</option>
                <option value="X">Comprobante X (No Fiscal)</option>
            </select>
        </div>
        <div class="form-group">
            <label for="factura-medio-pago">Medio de Pago:</label>
            <select id="factura-medio-pago">
                <option>Efectivo</option>
                <option>Mercado Pago</option>
                <option>Tarjeta</option>
                <option>Transferencia</option>
            </select>
        </div>
        <div class="form-actions">
            <button id="btn-confirmar-factura-oficial" class="btn-primary">Confirmar Factura Oficial (AFIP)</button>
            <button id="btn-confirmar-factura-negro" class="btn-secondary">Confirmar Factura "X"</button>
        </div>
    </div>
</div>
