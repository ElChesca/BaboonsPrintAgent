<link rel="stylesheet" href="/static/css/historial_inventario.css">

<div class="card">
    <h2>📈 Historial de Movimientos de Inventario</h2>

    <div class="filtros-historial">
        <div class="form-group">
            <label for="filtro-fecha-desde">Desde:</label>
            <input type="date" id="filtro-fecha-desde">
        </div>
        <div class="form-group">
            <label for="filtro-fecha-hasta">Hasta:</label>
            <input type="date" id="filtro-fecha-hasta">
        </div>
        <div class="form-group" style="flex-grow: 1;">
            <label for="filtro-producto">Producto:</label>
            <select id="filtro-producto">
                <option value="">-- Todos --</option>
                </select>
        </div>
        <button id="btn-filtrar-historial" class="btn-secondary">Filtrar</button>
        <button id="btn-exportar-pdf" class="btn-info">PDF</button>
        <button id="btn-exportar-excel" class="btn-success">Excel</button>
    </div>

    <div class="tabla-contenedor">
        <table id="tabla-historial-inventario" class="tabla-bonita">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Producto</th>
                    <th>Movimiento</th>
                    <th>Cantidad</th>
                    <th>Stock Resultante</th>
                    <th>Usuario</th> </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
