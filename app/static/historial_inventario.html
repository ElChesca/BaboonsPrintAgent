<link rel="stylesheet" href="/static/css/historial_inventario.css">

<div class="historial-card fade-in">
    <div class="historial-header">
        <h2><i class="fas fa-chart-line text-primary"></i> Historial de Movimientos de Inventario</h2>
        <div class="acciones-historial">
            <button id="btn-exportar-pdf" class="btn btn-outline-danger btn-sm">
                <i class="fas fa-file-pdf"></i> PDF
            </button>
            <button id="btn-exportar-excel" class="btn btn-outline-success btn-sm">
                <i class="fas fa-file-excel"></i> Excel
            </button>
        </div>
    </div>

    <div class="filtros-historial">
        <div class="form-group">
            <label for="filtro-fecha-desde">Fecha Desde</label>
            <input type="date" id="filtro-fecha-desde">
        </div>
        <div class="form-group">
            <label for="filtro-fecha-hasta">Fecha Hasta</label>
            <input type="date" id="filtro-fecha-hasta">
        </div>
        <div class="form-group" style="flex-grow: 2;">
            <label for="filtro-producto">Filtrar por Producto</label>
            <select id="filtro-producto">
                <option value="">-- Todos los Productos --</option>
            </select>
        </div>
        <div class="form-group">
            <label for="filtro-tipo">Tipo Movimiento</label>
            <select id="filtro-tipo">
                <option value="">-- Todos --</option>
                <option value="Venta">Venta</option>
                <option value="Ingreso">Ingreso</option>
                <option value="Ajuste">Ajuste</option>
                <option value="Reserva Pedido">Reserva Pedido</option>
                <option value="Rebote">Rebote</option>
            </select>
        </div>
        <div class="form-group">
            <label for="filtro-tipo">Tipo Movimiento</label>
            <select id="filtro-tipo">
                <option value="">-- Todos --</option>
                <option value="Venta">Venta</option>
                <option value="Ingreso">Ingreso</option>
                <option value="Ajuste">Ajuste</option>
                <option value="Reserva Pedido">Reserva Pedido</option>
                <option value="Rebote">Rebote</option>
            </select>
        </div>
        <div>
            <button id="btn-filtrar-historial" class="btn-icon btn-filter">
                <i class="fas fa-filter"></i> Filtrar
            </button>
        </div>
    </div>

    <div class="table-responsive">
        <table id="tabla-historial-inventario" class="tabla-moderna">
            <thead>
                <tr>
                    <th>Fecha y Hora</th>
                    <th>Producto</th>
                    <th>Tipo de Movimiento</th>
                    <th style="text-align: center;">Hoja Ruta</th>
                    <th style="text-align: center;">Pedido</th>
                    <th style="text-align: right;">Cantidad</th>
                    <th style="text-align: right;">Stock Resultante</th>
                    <th>Usuario Responsable</th>
                </tr>
            </thead>
            <tbody>
                <!-- Se puebla dinámicamente -->
            </tbody>
        </table>
        <div id="loading-indicator" style="display: none; text-align: center; padding: 20px;">
            <i class="fas fa-spinner fa-spin"></i> Cargando...
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <button id="btn-cargar-mas" class="btn btn-primary" style="display: none;">Cargar más</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
