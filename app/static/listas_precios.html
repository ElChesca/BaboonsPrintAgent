<link rel="stylesheet" href="static/css/listas_precios.css">

<div class="gestion-listas-container">

    <div class="panel-izquierdo">
        <h2>Listas de Precios</h2>
        <div id="contenedor-listas">
            </div>
        <button id="btn-nueva-lista" class="btn btn-primary">➕ Crear Nueva Lista</button>
    </div>

    <div class="panel-derecho">
        <div id="panel-detalle-lista" class="hidden">
            <h2 id="detalle-nombre-lista"></h2>
            <p id="detalle-descripcion-lista"></p>

            <h3>Agregar Nueva Regla</h3>
            <form id="form-agregar-regla">
                <div>
                    <label for="regla-producto">Producto (opcional)</label>
                    <select id="regla-producto">
                        <option value="">-- Seleccionar producto --</option>
                        </select>
                </div>
                <div>
                    <label for="regla-categoria">Categoría (opcional)</label>
                    <div class="input-with-button"> <select id="regla-categoria">
                            <option value="">-- Seleccionar categoría --</option>
                        </select>
                        <button type="button" id="btn-aplicar-todas-categorias" class="btn btn-secondary" title="Aplicar a Todas las Categorías">
                            Todas
                        </button>
                    </div>
                </div>
                </div>
                <div>
                    <label for="regla-precio-fijo">Precio Fijo ($)</label>
                    <input type="number" id="regla-precio-fijo" step="0.01" placeholder="Ej: 1500.50">
                </div>
                 <div>
                    <label for="regla-descuento">Descuento (%)</label>
                    <input type="number" id="regla-descuento" step="0.01" placeholder="Ej: 15.5">
                </div>
                <button type="submit" class="btn btn-primary">Agregar Regla</button>
            </form>
            
            <h3>Reglas Activas</h3>
            <div class="tabla-contenedor">
                <table id="tabla-reglas" class="tabla-bonita">
                    <thead>
                        <tr>
                            <th>Condición</th>
                            <th>Acción</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-reglas">
                        </tbody>
                </table>
            </div>

        </div>
        <div id="panel-placeholder">
            <p>Selecciona una lista de precios a la izquierda para ver sus detalles y reglas.</p>
        </div>
    </div>
</div>

<div id="modal-nueva-lista" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Crear Nueva Lista de Precios</h2>
            <span class="close-button" id="close-nueva-lista-modal">&times;</span>
        </div>
        <form id="form-nueva-lista">
            <label for="nombre-lista">Nombre:</label>
            <input type="text" id="nombre-lista" required>
            
            <label for="descripcion-lista">Descripción:</label>
            <textarea id="descripcion-lista" rows="3"></textarea>
            
            <button type="submit" class="btn btn-primary">Crear Lista</button>
        </form>
    </div>
</div>
