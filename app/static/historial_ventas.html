<div class="card">
    <h2>Historial de Ventas</h2>
    <div class="filters">
        <label>Desde:</label> <input type="date" id="fecha-desde">
        <label>Hasta:</label> <input type="date" id="fecha-hasta">
        <button id="btn-filtrar-ventas">Filtrar</button>
    </div>
    
    <div class="tabla-contenedor">
        <table id="tabla-historial-ventas" class="tabla-bonita">
            <thead>
                <tr>
                    <!-- ✨ CORRECCIÓN: Unificamos las columnas a 7 -->
                    <th>ID</th>
                    <th>Fecha</th>
                    <th>Cliente</th>
                    <th>Forma de Pago</th>
                    <th>Total</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <!-- Contenido generado por JS -->
            </tbody>
            <tfoot>
                <tr>
                    <!-- ✨ CORRECCIÓN: Ajustamos el colspan para que coincida -->
                    <th colspan="4" style="text-align: right;">TOTAL GENERAL:</th>
                    <td id="total-historial-ventas">$0.00</td>
                    <td colspan="2"></td> <!-- Celdas vacías para alinear correctamente -->
                </tr>
            </tfoot>
        </table>
    </div>
</div>

<!-- ✨ MEJORA: El modal ahora está fuera de la estructura de la tabla, más limpio y seguro -->
<div id="modal-facturar" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modal-facturar-titulo">Facturar Venta</h2>
            <span class="close-button" id="close-facturar-modal">&times;</span>
        </div>
        <p id="modal-facturar-texto">¿Cómo deseas facturar la Venta Nro. X?</p>
        <div class="form-actions" style="justify-content: center; gap: 20px;">
            <button id="btn-facturar-oficial" class="btn-primary">Factura Oficial (AFIP)</button>
            <button id="btn-facturar-negro" class="btn-secondary">Factura "X" (No Fiscal)</button>
        </div>
    </div>
</div>
