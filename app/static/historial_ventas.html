<style>
    .filters {
        margin-bottom: 20px;
        display: flex;
        gap: 15px;
        align-items: center;
    }
    #tabla-historial-ventas {
        width: 100%;
        border-collapse: collapse;
    }
    #tabla-historial-ventas th, #tabla-historial-ventas td {
        padding: 12px 15px;
        text-align: left;
        border-bottom: 1px solid #ddd;
    }
    #tabla-historial-ventas thead th {
        background-color: #28a745;
        color: white;
    }
    /* ✨ NUEVO: Estilos para el pie de tabla */
    #tabla-historial-ventas tfoot th {
        text-align: right;
        font-size: 1.2em;
        font-weight: bold;
        padding-top: 15px;
        border-top: 2px solid #333;
    }
    #tabla-historial-ventas tfoot td {
        font-size: 1.2em;
        font-weight: bold;
        padding-top: 15px;
        border-top: 2px solid #333;
    }
    .master-row { cursor: pointer; transition: background-color 0.2s; }
    .master-row:hover { background-color: #f5f5f5; }
    .master-row.active { background-color: #e8f9ec; }
    .detail-row td { background-color: #fafafa; padding: 20px !important; }
</style>

<div class="card">
    <h2>Historial de Ventas</h2>
    <div class="filters">
        <label>Desde:</label> <input type="date" id="fecha-desde">
        <label>Hasta:</label> <input type="date" id="fecha-hasta">
        <button id="btn-filtrar-ventas">Filtrar</button>
    </div>
    
    <table id="tabla-historial-ventas">
        <thead>
            <tr>
                <th>ID</th>
                <th>Fecha</th>
                <th>Cliente</th>
                <th>Forma de Pago</th>
                <th>Total</th>
                <th>Ver Detalles</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
        <tfoot>
            <tr>
                <th colspan="4">TOTAL GENERAL:</th>
                <td id="total-historial-ventas">$0.00</td>
                <td></td>
            </tr>
        </tfoot>
    </table>
</div>
