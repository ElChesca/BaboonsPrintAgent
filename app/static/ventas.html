<link rel="stylesheet" href="/static/css/ventas.css">

<div class="pos-container">

    <div class="pos-header card">
        <div class="form-group input-with-button">
            <label for="cliente-selector">Cliente</label>
            <select id="cliente-selector"></select>
            <button type="button" id="btn-nuevo-cliente-rapido" class="btn-add-quick" title="Crear Nuevo Cliente">+</button>
        </div>
        <div class="form-group">
            <label for="lista-precios-selector">Lista de Precios</label>
            <select id="lista-precios-selector"></select>
        </div>
        <div class="form-group">
            <label for="metodo-pago-selector">Forma de Pago</label>
            <select id="metodo-pago-selector" name="metodo_pago">
                <option value="Efectivo">Efectivo</option>
                <option value="MP">Mercado Pago</option>
                <option value="Tarjeta">Tarjeta</option>
                <option value="Debito">Débito</option>
                <option value="Transf.">Transferencia</option>
            </select>
        </div>
        <div id="info-caja-activa" class="caja-status-label">Cargando...</div>
    </div>

    <div class="search-panel">
        <form id="form-add-item-venta">
            <div class="form-group">
                <label for="venta-producto-input">Buscar Producto</label>
                <input type="text" id="venta-producto-input" autocomplete="off" placeholder="Escriba para buscar...">
            </div>
            <div class="form-group">
                <label for="venta-item-cantidad">Cantidad</label>
                <input type="number" id="venta-item-cantidad" step="any" value="1" required>
            </div>
            <button type="submit" class="btn-primary btn-add-item">Añadir</button>
        </form>
        <div id="search-results-venta" style="display: none;"></div>
    </div>

    <div class="pos-main-grid">
        <div class="venta-panel">
            <div class="card">
                <div class="panel-header">
                    <h3>Acceso Rápido</h3>
                    <div class="switch-container">
                        <label for="toggle-acceso-rapido">Mostrar</label>
                        <label class="switch"><input type="checkbox" id="toggle-acceso-rapido" checked><span class="slider"></span></label>
                    </div>
                </div>
                <div id="pos-grid-container"></div>
            </div>
            
            <div class="card">
                <h3>Venta Actual</h3>
                <div class="tabla-contenedor-venta">
                    <table id="staged-items-venta" class="tabla-venta-elegante">
                        <thead><tr><th>Producto /SKU</th><th>Cant.</th><th>Precio U.</th><th>Dto.</th><th>Subtotal</th><th>Acc.</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
            
            <div class="card venta-footer">
                <div class="venta-ajustes-extra">
                    <div class="form-group">
                        <label for="descuento-extra">Descuento Extra ($)</label>
                        <input type="number" id="descuento-extra" step="0.01" placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label for="gastos-envio">Gastos de Envío ($)</label>
                        <input type="number" id="gastos-envio" step="0.01" placeholder="0.00">
                    </div>
                </div>
                <div class="venta-total-display">
                    <span>TOTAL</span>
                    <strong id="venta-total">$0.00</strong>
                </div>
                <form id="form-finalize-venta" class="finalization-controls">
                    <div id="calculo-vuelto-container" class="form-group">
                        <label for="paga-con-input">Paga con</label>
                        <input type="number" id="paga-con-input" step="any">
                        <div class="vuelto-display">
                            <span>Vuelto:</span>
                            <span id="vuelto-monto">$0.00</span>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" id="btn-finalize-sale" class="btn-primary">Cobrar</button>
                        <button type="button" id="btn-finalize-and-print" class="btn-secondary">Cobrar e Imprimir</button>
                    </div>
                </form>
                <div id="pago-detalles-container" style="display: none;">
                    <div class="form-group"><label>DNI:</label><input type="text" id="pago-dni"></div>
                     <div class="form-group"><label>Tarjeta (últ. 4):</label><input type="text" id="pago-tarjeta" maxlength="4"></div>
                     <div class="form-group"><label>Cupón:</label><input type="text" id="pago-cupon"></div>
                     <div class="form-group"><label>Banco:</label><input type="text" id="pago-banco"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-nuevo-cliente-rapido" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Crear Nuevo Cliente</h3>
                <span id="close-modal-cliente-rapido" class="close-button">&times;</span>
            </div>
            <form id="form-nuevo-cliente-rapido">
                <div class="form-group">
                    <label for="cliente-rapido-nombre">Nombre:</label>
                    <input type="text" id="cliente-rapido-nombre" required>
                </div>
                <div class="form-group">
                    <label for="cliente-rapido-dni">DNI/CUIT:</label>
                    <input type="text" id="cliente-rapido-dni">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Guardar Cliente</button>
                </div>
            </form>
        </div>
    </div>
</div>
