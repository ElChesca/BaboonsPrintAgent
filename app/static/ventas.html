<link rel="stylesheet" href="/static/css/ventas.css">

<div class="pos-container">

    <div class="pos-header card">
        <div class="form-group input-with-button client-search-group">
            <label for="cliente-display">Cliente</label>
            <div class="search-input-container">
                <input type="hidden" id="cliente-selector" value="">
                <input type="text" id="cliente-display" readonly placeholder="Consumidor Final"
                    class="search-input-display">
                <button type="button" id="btn-buscar-cliente" class="btn-search-icon" title="Buscar Cliente">
                    <i class="fas fa-search"></i>
                </button>
            </div>
            <button type="button" id="btn-nuevo-cliente-rapido" class="btn-add-quick"
                title="Crear Nuevo Cliente">+</button>
        </div>
        <div class="form-group">
            <label for="lista-precios-selector">Lista de Precios</label>
            <select id="lista-precios-selector"></select>
        </div>
        <div class="form-group">
            <label for="metodo-pago-selector">Forma de Pago</label>
            <select id="metodo-pago-selector" name="metodo_pago">
                <option value="Efectivo">Efectivo</option>
                <option value="MP">Mercado Pago</option>
                <option value="Tarjeta">Tarjeta</option>
                <option value="Debito">Débito</option>
                <option value="Transferencia">Transferencia</option>
                <option value="Cuenta Corriente">Cuenta Corriente</option>
                <option value="Mixto">Pago Mixto + Cta Cte</option>
            </select>
        </div>
        <div id="info-caja-activa" class="caja-status-label">Cargando...</div>
    </div>

    <div class="search-panel">
        <form id="form-add-item-venta">
            <div class="form-group">
                <label for="venta-producto-input">Buscar Producto</label>
                <input type="text" id="venta-producto-input" autocomplete="off" placeholder="Escriba para buscar...">
            </div>
            <div class="form-group">
                <label for="venta-item-cantidad">Cantidad</label>
                <input type="number" id="venta-item-cantidad" step="any" value="1" required>
            </div>
            <button type="submit" class="btn-primary btn-add-item">Añadir</button>
        </form>
        <div id="search-results-venta" style="display: none;"></div>
    </div>

    <div class="pos-main-grid">
        <div class="venta-panel">
            <div class="card sale-items-card">
                <div class="panel-header">
                    <h3>Venta Actual</h3>
                </div>
                <div class="tabla-contenedor-venta">
                    <table id="staged-items-venta" class="tabla-venta-elegante">
                        <thead>
                            <tr>
                                <th>Producto / SKU</th>
                                <th>Cant.</th>
                                <th>Precio U.</th>
                                <th>Dto. / Bonif.</th>
                                <th>Subtotal</th>
                                <th class="actions-col"></th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div class="card venta-footer">
                <div class="venta-ajustes-container">
                    <div class="venta-resumen-items">
                        <div class="resumen-dato">
                            <span class="resumen-label">Artículos (SKUs)</span>
                            <span class="resumen-valor" id="resumen-skus">0</span>
                        </div>
                        <div class="resumen-dato">
                            <span class="resumen-label">Total Unidades</span>
                            <span class="resumen-valor" id="resumen-unidades">0</span>
                        </div>
                        <div class="resumen-dato">
                            <span class="resumen-label">Subtotal Líneas</span>
                            <span class="resumen-valor" id="resumen-subtotal-lineas">$0.00</span>
                        </div>
                    </div>

                    <div class="venta-ajustes-extra">
                        <div class="form-group">
                            <label for="bonificacion-global">Bonif. Global (%)</label>
                            <input type="number" id="bonificacion-global" step="0.01" placeholder="0.00" min="0"
                                max="100">
                        </div>
                        <div class="form-group">
                            <label for="descuento-extra">Desc. Global ($)</label>
                            <input type="number" id="descuento-extra" step="0.01" placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label for="gastos-envio">Gastos de Envío ($)</label>
                            <input type="number" id="gastos-envio" step="0.01" placeholder="0.00">
                        </div>
                    </div>

                    <div class="venta-total-section">
                        <div class="venta-total-display">
                            <span>TOTAL A COBRAR</span>
                            <strong id="venta-total">$0.00</strong>
                        </div>
                    </div>
                </div>

                <form id="form-finalize-venta" class="finalization-controls">
                    <div id="calculo-vuelto-container" class="form-group payer-group">
                        <label for="paga-con-input">Paga con</label>
                        <div class="input-wrapper">
                            <input type="number" id="paga-con-input" step="any" placeholder="0.00">
                            <div class="vuelto-display">
                                <span>Vuelto:</span>
                                <span id="vuelto-monto">$0.00</span>
                            </div>
                        </div>
                    </div>

                    <!-- NUEVO PANEL PAGO MIXTO (Oculto por defecto) -->
                    <div id="panel-pago-mixto" class="pago-mixto-container" style="display: none;">
                        <div class="mixto-grid">
                            <div class="form-group mixed-group">
                                <label for="mixto-efectivo">Efectivo</label>
                                <input type="number" id="mixto-efectivo" class="mixto-input" step="any"
                                    placeholder="0.00">
                            </div>
                            <div class="form-group mixed-group">
                                <label for="mixto-mp">Mercado Pago</label>
                                <input type="number" id="mixto-mp" class="mixto-input" step="any" placeholder="0.00">
                            </div>
                        </div>
                        <div class="mixto-resumen">
                            <span>A Cta Cte:</span>
                            <strong id="mixto-restante">$0.00</strong>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" id="btn-finalize-sale" class="btn-primary btn-action-main">
                            <i class="fas fa-check-circle"></i> Cobrar
                        </button>
                        <button type="button" id="btn-finalize-and-print" class="btn-secondary btn-action-sub">
                            <i class="fas fa-print"></i> Cobrar e Imprimir
                        </button>
                    </div>
                </form>
                <div id="pago-detalles-container" class="pago-detalles-grid" style="display: none;">
                    <div class="form-group"><label>DNI:</label><input type="text" id="pago-dni"></div>
                    <div class="form-group"><label>Tarjeta (últ. 4):</label><input type="text" id="pago-tarjeta"
                            maxlength="4"></div>
                    <div class="form-group"><label>Cupón:</label><input type="text" id="pago-cupon"></div>
                    <div class="form-group"><label>Banco:</label><input type="text" id="pago-banco"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-nuevo-cliente-rapido" class="baboons-modal">
        <div class="baboons-modal-content">
            <div class="baboons-modal-header">
                <h3>Crear Nuevo Cliente</h3>
                <span id="close-modal-cliente-rapido" class="close-button">&times;</span>
            </div>
            <form id="form-nuevo-cliente-rapido">
                <div class="form-group">
                    <label for="cliente-rapido-nombre">Nombre:</label>
                    <input type="text" id="cliente-rapido-nombre" required>
                </div>
                <div class="form-group">
                    <label for="cliente-rapido-dni">DNI/CUIT:</label>
                    <input type="text" id="cliente-rapido-dni">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Guardar Cliente</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal de Búsqueda de Clientes -->
    <div id="modal-buscar-cliente" class="baboons-modal">
        <div class="baboons-modal-content search-modal">
            <div class="baboons-modal-header">
                <h3>Buscar Cliente</h3>
                <span id="close-modal-buscar-cliente" class="close-button">&times;</span>
            </div>
            <div class="modal-body">
                <div class="search-box-container">
                    <i class="fas fa-search"></i>
                    <input type="text" id="input-buscar-cliente-modal" placeholder="Escribe nombre, DNI o ID..."
                        autofocus autocomplete="off">
                </div>
                <div id="resultados-busqueda-clientes" class="search-results-list">
                    <div class="search-placeholder">Escribe para empezar a buscar...</div>
                </div>
            </div>
        </div>
    </div>
</div>
