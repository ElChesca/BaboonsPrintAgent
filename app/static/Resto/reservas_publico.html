<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ og_title }}</title>
    
    <!-- Open Graph -->
    <meta property="og:title" content="{{ og_title }}">
    <meta property="og:image" content="{{ og_image }}">
    <meta property="og:type" content="website">
    <meta name="description" content="Reserva tu mesa online de forma rápida y sencilla.">

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --border: #e2e8f0;
            --success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.5;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header img {
            max-width: 120px;
            margin-bottom: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .header h1 { font-size: 1.5rem; font-weight: 800; color: var(--text-main); }
        .header p { color: var(--text-muted); font-size: 0.95rem; }

        .card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: var(--text-main);
        }
        .form-group i { margin-right: 6px; color: var(--text-muted); }

        .input-control {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
            background: #fdfdfd;
        }
        .input-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .slots-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        .slot-btn {
            padding: 10px;
            text-align: center;
            border-radius: 10px;
            background: #f1f5f9;
            border: 2px solid transparent;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .slot-btn:hover:not(.disabled) { background: #e2e8f0; }
        .slot-btn.selected {
            background: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
        }
        .slot-btn.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            text-decoration: line-through;
        }

        .btn-confirm {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-confirm:hover { background: #1d4ed8; transform: translateY(-2px); }
        .btn-confirm:active { transform: translateY(0); }

        /* Pantalla de Éxito */
        #success-screen { display: none; text-align: center; }
        .success-icon {
            font-size: 4rem;
            color: var(--success);
            margin-bottom: 20px;
            display: block;
        }

        .footer {
            text-align: center;
            padding: 40px 0;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container" id="main-content">
    <div class="header">
        {% if negocio.logo_url_resto %}
            <img src="{{ negocio.logo_url_resto }}" alt="Logo">
        {% else %}
            <img src="/static/img/logo_baboons.png" alt="Baboons">
        {% endif %}
        <h1>{{ negocio.nombre }}</h1>
        <p>Portal de Reservas</p>
    </div>

    <!-- FORMULARIO DE RESERVA -->
    <div class="card" id="form-screen">
        <div class="form-group">
            <label><i class="fas fa-user"></i> Tu Nombre</label>
            <input type="text" id="res-nombre" class="input-control" placeholder="Ej: Juan Pérez">
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label><i class="fas fa-calendar"></i> Fecha</label>
                <input type="date" id="res-fecha" class="input-control">
            </div>
            <div class="form-group">
                <label><i class="fas fa-users"></i> Comensales</label>
                <input type="number" id="res-pax" class="input-control" value="2" min="1">
            </div>
        </div>

        <div class="form-group">
            <label><i class="fas fa-clock"></i> Horarios Disponibles</label>
            <div id="slots-loader" style="display:none; text-align:center; padding:10px;">
                <i class="fas fa-circle-notch fa-spin"></i> Buscando horarios...
            </div>
            <div id="slots-container" class="slots-container">
                <p style="grid-column: 1/-1; text-align: center; color: var(--text-muted); font-size: 0.85rem;">Elegí una fecha para ver horarios</p>
            </div>
        </div>

        <div class="form-group">
            <label><i class="fas fa-phone"></i> Teléfono (Obligatorio)</label>
            <input type="tel" id="res-tel" class="input-control" placeholder="Ej: 1122334455">
        </div>

        <div class="form-group">
            <label><i class="fas fa-map-marker-alt"></i> Sector Preferido</label>
            <select id="res-sector" class="input-control">
                <option value="Salon">Salón Principal</option>
                <option value="Terraza">Terraza / Exterior</option>
                <option value="VIP">Sector VIP</option>
                <option value="Barra">Barra</option>
            </select>
        </div>

        <button class="btn-confirm" id="btn-confirmar">
            Confirmar Reserva <i class="fas fa-arrow-right"></i>
        </button>
    </div>

    <!-- PANTALLA ÉXITO -->
    <div class="card" id="success-screen">
        <i class="fas fa-check-circle success-icon"></i>
        <h2 style="margin-bottom: 10px;">¡Reserva Recibida!</h2>
        <p id="success-msg">Tu pedido de reserva se envió correctamente. Te contactaremos pronto para confirmar.</p>
        <button class="btn-confirm" style="background:var(--text-main); margin-top:30px;" onclick="location.reload()">
            Hacer otra reserva
        </button>
    </div>

    <div class="footer">
        Potenciado por <b>Baboons ERP</b> &copy; 2024
    </div>
</div>

<script>
    // Variables de contexto (inyectadas por Jinja)
    const TOKEN_NEGOCIO = "{{ token }}";
    const NEGOCIO_ID = "{{ negocio_id }}";

    // Elementos DOM
    const inputFecha = document.getElementById('res-fecha');
    const containerSlots = document.getElementById('slots-container');
    const loaderSlots = document.getElementById('slots-loader');
    const btnConfirmar = document.getElementById('btn-confirmar');
    
    let slotSeleccionado = null;

    // Configurar fecha mínima (hoy)
    window.onload = () => {
        const hoy = new Date().toISOString().split('T')[0];
        inputFecha.min = hoy;
        inputFecha.value = hoy;
        cargarDisponibilidad();
    };

    inputFecha.onchange = cargarDisponibilidad;

    async function cargarDisponibilidad() {
        const fecha = inputFecha.value;
        if(!fecha) return;

        loaderSlots.style.display = 'block';
        containerSlots.innerHTML = '';
        slotSeleccionado = null;

        try {
            // Fallback: Si no hay token, usamos el ID de negocio inyectado
            const url = TOKEN_NEGOCIO 
                ? `/api/public/reservas/disponibilidad?t=${TOKEN_NEGOCIO}&fecha=${fecha}`
                : `/api/public/reservas/disponibilidad?t=&id=${NEGOCIO_ID}&fecha=${fecha}`;
            
            const res = await fetch(url);
            const data = await res.json();
            
            loaderSlots.style.display = 'none';
            
            if(data.error) {
                containerSlots.innerHTML = `<p style="grid-column: 1/-1; color:red;">${data.error}</p>`;
                return;
            }

            if(data.slots && data.slots.length > 0) {
                data.slots.forEach(s => {
                    const btn = document.createElement('div');
                    btn.className = `slot-btn ${s.disponible ? '' : 'disabled'}`;
                    btn.innerText = s.hora;
                    if(s.disponible) {
                        btn.onclick = () => {
                            document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
                            btn.classList.add('selected');
                            slotSeleccionado = s.hora;
                        };
                    }
                    containerSlots.appendChild(btn);
                });
            } else {
                containerSlots.innerHTML = `<p style="grid-column: 1/-1; text-align: center;">No hay turnos para este día.</p>`;
            }
        } catch (e) {
            loaderSlots.style.display = 'none';
            containerSlots.innerHTML = `<p style="grid-column: 1/-1; color:red;">Error de conexión.</p>`;
        }
    }

    btnConfirmar.onclick = async () => {
        const nombre = document.getElementById('res-nombre').value.trim();
        const fecha = inputFecha.value;
        const hora = slotSeleccionado;
        const pax = document.getElementById('res-pax').value;
        const tel = document.getElementById('res-tel').value.trim();
        const sector = document.getElementById('res-sector').value;

        if(!nombre || !fecha || !hora || !tel) {
            alert("Por favor completa nombre, teléfono y elegí un horario.");
            return;
        }

        btnConfirmar.disabled = true;
        btnConfirmar.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Enviando...`;

        try {
            const res = await fetch('/api/public/reservas/crear', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    t: TOKEN_NEGOCIO,
                    nombre: nombre,
                    fecha: fecha,
                    hora: hora,
                    num_comensales: pax,
                    telefono: tel,
                    sector_preferido: sector
                })
            });
            
            const data = await res.json();
            if(data.error) {
                alert(data.error);
                btnConfirmar.disabled = false;
                btnConfirmar.innerHTML = `Confirmar Reserva <i class="fas fa-arrow-right"></i>`;
            } else {
                document.getElementById('form-screen').style.display = 'none';
                document.getElementById('success-screen').style.display = 'block';
                window.scrollTo(0,0);
            }
        } catch (e) {
            alert("Error al enviar reserva. Intenta de nuevo.");
            btnConfirmar.disabled = false;
        }
    };
</script>

</body>
</html>
