<div class="seccion-contenido-dinamico">
    <h2>📦 Gestión de Caja</h2>
    <div class="main-grid">
        <div class="card">
            <div id="seccion-abrir-caja" style="display: none;">
                <h3>Apertura de Caja</h3>
                <p>La caja para este negocio está actualmente cerrada. Ingresa el monto inicial para comenzar.</p>
                <form id="form-abrir-caja">
                    <div class="form-group">
                        <label for="monto-inicial">Monto Inicial (efectivo para cambio):</label>
                        <input type="number" id="monto-inicial" step="0.01" required placeholder="Ej: 5000.00">
                    </div>
                    <button type="submit" class="btn-primary">Abrir Caja</button>
                </form>
            </div>
            <div id="seccion-cerrar-caja" style="display: none;">
                <h3>Cierre de Caja</h3>
                <div id="info-sesion-actual"></div>
                <form id="form-cerrar-caja">
                    <div class="form-group">
                        <label for="monto-final-contado">Monto Final Contado (dinero físico en caja):</label>
                        <input type="number" id="monto-final-contado" step="0.01" required placeholder="Ej: 25500.50">
                    </div>
                    <button type="submit" class="btn-danger">Cerrar Caja</button>
                </form>
            </div>
        </div>
        <div class="card">
            <h3>Historial Reciente</h3>
            <p>(Próximamente...)</p>
        </div>
    </div>

    <div id="modal-resumen-cierre" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close-button" onclick="document.getElementById('modal-resumen-cierre').style.display='none'">&times;</span>
            <h3>Resumen del Cierre de Caja</h3>
            <div id="contenido-resumen"></div>
        </div>
    </div>
</div>
