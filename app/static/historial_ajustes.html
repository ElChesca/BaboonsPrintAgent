<div class="card">
    <h2>🧾 Historial de Ajustes de Caja</h2>
    <div class="filters">
        <label>Desde:</label> <input type="date" id="fecha-desde-ajustes">
        <label>Hasta:</label> <input type="date" id="fecha-hasta-ajustes">
        <button id="btn-filtrar-ajustes">Filtrar</button>
    </div>
    
    <div class="tabla-contenedor">
        <table id="tabla-historial-ajustes" class="tabla-bonita">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Usuario</th>
                    <th>Concepto</th>
                    <th>Tipo</th>
                    <th>Monto</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>
