<div class="card">
    <h2>🧾 Historial de Ajustes de Caja</h2>
    <div class="filters">
        <div class="form-group">
            <label>Desde:</label>
            <input type="date" id="fecha-desde-ajustes">
        </div>
        <div class="form-group">
            <label>Hasta:</label>
            <input type="date" id="fecha-hasta-ajustes">
        </div>

        <div class="form-group">
            <label>Tipo de Movimiento:</label>
            <div class="filter-pills" id="tipo-movimiento-ajustes">
                <button class="pill active" data-value="">Todos</button>
                <button class="pill" data-value="Ingreso">Ingresos</button>
                <button class="pill" data-value="Egreso">Egresos</button>
            </div>
        </div>

        <button id="btn-filtrar-ajustes" class="btn-primary">Filtrar</button>
    </div>

    <div class="tabla-contenedor">
        <table id="tabla-historial-ajustes" class="tabla-bonita">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Usuario</th>
                    <th>Concepto</th>
                    <th>Tipo</th>
                    <th>Monto</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>

        <!-- Indicador de carga -->
        <div id="loading-ajustes" style="display: none; text-align: center; padding: 20px;">
            Cargando registros...
        </div>

        <div class="table-footer" style="text-align: center; margin-top: 20px; margin-bottom: 20px;">
            <button id="btn-cargar-mas-ajustes" class="btn-secondary" style="display: none;">Cargar más
                registros</button>
        </div>
    </div>
</div>
