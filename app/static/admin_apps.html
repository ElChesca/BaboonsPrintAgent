<!-- admin_apps.html — Panel de Administración Premium -->
<style>
  #admin-apps-root {
    font-family: 'Inter', sans-serif;
    background: #f1f5f9;
    min-height: 100vh;
    padding: 24px;
  }

  /* ── Tabs ── */
  .admin-tab-bar { display: flex; gap: 8px; flex-wrap: wrap; padding-bottom: 16px; border-bottom: 2px solid #e2e8f0; margin-bottom: 24px; }
  .admin-tab-btn {
    padding: 9px 20px; border-radius: 12px; border: 2px solid #e2e8f0;
    background: white; font-size: 0.83rem; font-weight: 700; color: #64748b;
    cursor: pointer; transition: all .2s; letter-spacing: .02em;
  }
  .admin-tab-btn:hover { border-color: #a5b4fc; color: #4f46e5; background: #f5f3ff; }
  .admin-tab-btn.active {
    background: #4f46e5; color: white; border-color: #4f46e5;
    box-shadow: 0 4px 14px rgba(79,70,229,.35);
    transform: translateY(-2px);
  }
  .admin-tab-btn.tab-green.active  { background: #10b981; border-color: #10b981; box-shadow: 0 4px 14px rgba(16,185,129,.35); }
  .admin-tab-btn.tab-indigo.active { background: #6366f1; border-color: #6366f1; box-shadow: 0 4px 14px rgba(99,102,241,.35); }

  /* ── Category cards ── */
  .admin-cat-card {
    background: white; border-radius: 16px; border: 1px solid #f1f5f9;
    box-shadow: 0 2px 8px rgba(0,0,0,.05); overflow: hidden;
    transition: box-shadow .2s;
  }
  .admin-cat-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,.09); }
  .admin-cat-header {
    background: #f8fafc; padding: 12px 16px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid #f1f5f9;
  }
  .admin-cat-title { font-size: .72rem; font-weight: 800; letter-spacing: .07em; color: #475569; text-transform: uppercase; }
  .admin-cat-actions { display: flex; gap: 8px; }
  .admin-micro-btn {
    font-size: .68rem; font-weight: 700; padding: 2px 8px; border-radius: 6px;
    border: 1.5px solid currentColor; cursor: pointer; background: transparent;
    transition: all .15s;
  }
  .admin-micro-btn.on  { color: #10b981; }
  .admin-micro-btn.on:hover  { background: #d1fae5; }
  .admin-micro-btn.off { color: #ef4444; }
  .admin-micro-btn.off:hover { background: #fee2e2; }

  /* ── Module rows ── */
  .module-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; border-bottom: 1px solid #f8fafc; transition: background .15s;
  }
  .module-row:last-child { border-bottom: none; }
  .module-row:hover { background: #f8faff; }
  .module-row-label { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  .module-icon { width: 22px; height: 22px; object-fit: contain; opacity: .75; flex-shrink: 0; }
  .module-name { font-size: .84rem; font-weight: 600; color: #1e293b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .module-code { font-size: .68rem; color: #94a3b8; font-family: monospace; }

  /* ── Toggle switch ── */
  .admin-switch { position: relative; display: inline-block; width: 46px; height: 24px; flex-shrink: 0; }
  .admin-switch input { opacity: 0; width: 0; height: 0; }
  .admin-slider {
    position: absolute; inset: 0; background: #cbd5e1; border-radius: 24px;
    cursor: pointer; transition: background .2s;
  }
  .admin-slider:before {
    content: ""; position: absolute; width: 18px; height: 18px;
    left: 3px; top: 3px; background: white; border-radius: 50%;
    transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2);
  }
  .admin-switch input:checked + .admin-slider { background: #10b981; }
  .admin-switch input:checked + .admin-slider:before { transform: translateX(22px); }

  /* ── Search ── */
  .admin-search {
    width: 100%; max-width: 360px; border: 1.5px solid #e2e8f0; border-radius: 12px;
    padding: 9px 14px; font-size: .85rem; transition: border-color .2s, box-shadow .2s;
  }
  .admin-search:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,.12); }

  /* ── Suscripciones table ── */
  .sus-table { width: 100%; border-collapse: collapse; font-size: .84rem; }
  .sus-table th { background: #1e293b; color: white; padding: 12px 16px; font-size: .72rem; letter-spacing: .06em; text-transform: uppercase; font-weight: 700; }
  .sus-table th:first-child { border-radius: 12px 0 0 0; }
  .sus-table th:last-child  { border-radius: 0 12px 0 0; }
  .sus-table td { padding: 12px 16px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
  .sus-table tr:hover td { background: #f8faff; }
  .sus-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: .7rem; font-weight: 700; }
  .sus-badge.ok      { background: #dcfce7; color: #15803d; }
  .sus-badge.warn    { background: #fef3c7; color: #92400e; }
  .sus-badge.danger  { background: #fee2e2; color: #b91c1c; }
  .sus-badge.libre   { background: #f1f5f9; color: #64748b; }

  /* ── Action Buttons ── */
  .btn-admin-pay {
    padding: 5px 14px; border-radius: 10px; font-size: .76rem; font-weight: 700;
    border: none; background: #4f46e5; color: white; cursor: pointer; transition: all .15s;
  }
  .btn-admin-pay:hover { background: #4338ca; transform: translateY(-1px); }
  .btn-admin-hist {
    padding: 5px 10px; border-radius: 10px; font-size: .76rem;
    border: 1.5px solid #e2e8f0; background: white; color: #475569; cursor: pointer; transition: all .15s;
  }
  .btn-admin-hist:hover { border-color: #818cf8; color: #4f46e5; }

  /* ── Toolbar ── */
  .admin-toolbar { background: white; border-radius: 14px; padding: 14px 20px; box-shadow: 0 1px 6px rgba(0,0,0,.05); margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: space-between; }

  /* ── Footer buttons ── */
  .admin-footer { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; padding-top: 16px; border-top: 2px solid #f1f5f9; }
  .btn-admin-save {
    padding: 10px 28px; border-radius: 12px; background: #4f46e5; color: white;
    font-weight: 700; border: none; cursor: pointer; transition: all .2s; font-size: .88rem;
  }
  .btn-admin-save:hover { background: #4338ca; transform: translateY(-2px); box-shadow: 0 6px 16px rgba(79,70,229,.35); }
  .btn-admin-cancel {
    padding: 10px 20px; border-radius: 12px; background: white; color: #64748b;
    font-weight: 600; border: 2px solid #e2e8f0; cursor: pointer; transition: all .2s; font-size: .88rem;
  }
  .btn-admin-cancel:hover { border-color: #94a3b8; }

  /* ── Modal simple ── */
  .admin-modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
    z-index: 1060; align-items: center; justify-content: center;
  }
  .admin-modal-overlay.open { display: flex; }
  .admin-modal-box {
    background: white; border-radius: 20px; padding: 28px; width: 100%; max-width: 460px;
    box-shadow: 0 20px 60px rgba(0,0,0,.2); animation: modalIn .25s ease;
  }
  @keyframes modalIn { from { transform: scale(.95) translateY(10px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
  .admin-modal-title { font-size: 1rem; font-weight: 800; color: #1e293b; margin-bottom: 18px; display: flex; align-items: center; gap: 10px; }

  /* ── Negocio selector ── */
  .admin-selector { border-radius: 10px; border: 1.5px solid #e2e8f0; padding: 8px 12px; font-size: .84rem; }

  #admin-loading { text-align: center; padding: 60px 20px; }
</style>

<div id="admin-apps-root">
  <!-- Header -->
  <div class="d-flex justify-content-between align-items-start mb-4">
    <div>
      <h4 class="fw-bold mb-0" style="color:#1e293b;">🛠️ Administración del Ecosistema ERP</h4>
      <p class="text-muted small mb-0 mt-1">Configure módulos por tipo de negocio o por negocio individual.</p>
    </div>
  </div>

  <!-- Tabs -->
  <div class="admin-tab-bar">
    <button class="admin-tab-btn active" data-type="retail">Retail</button>
    <button class="admin-tab-btn" data-type="consorcio">Consorcio</button>
    <button class="admin-tab-btn" data-type="rentals">Rentals</button>
    <button class="admin-tab-btn" data-type="distribuidora">Distribuidora</button>
    <button class="admin-tab-btn" data-type="resto">Restó</button>
    <div style="width:2px;background:#e2e8f0;margin:0 4px;"></div>
    <button class="admin-tab-btn tab-indigo" data-type="business">📍 Por Negocio</button>
    <button class="admin-tab-btn tab-green" data-type="pagos">💳 Suscripciones</button>
  </div>

  <!-- Toolbar -->
  <div class="admin-toolbar" id="admin-tools-bar">
    <div id="negocio-selector-wrap" style="display:none;" class="d-flex align-items-center gap-2">
      <label class="text-muted small fw-bold mb-0">NEGOCIO:</label>
      <select id="admin-negocio-selector" class="admin-selector"></select>
    </div>
    <input type="text" id="admin-module-search" class="admin-search" placeholder="🔍  Buscar módulo...">
    <span class="text-muted small" id="admin-mod-count"></span>
  </div>

  <!-- Loading -->
  <div id="loading-permissions">
    <div class="spinner-border text-primary"></div>
    <p class="mt-3 text-muted">Sincronizando registros...</p>
  </div>

  <!-- Módulos Grid -->
  <div id="permissions-content" style="display:none;">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 id="current-type-title" class="fw-bold mb-0" style="color:#1e293b;">Módulos Disponibles</h5>
      <div class="d-flex gap-2">
        <button class="btn-admin-cancel" style="padding:6px 14px;font-size:.78rem;" onclick="window.toggleAllChecks(true)">✅ Marcar Todos</button>
        <button class="btn-admin-cancel" style="padding:6px 14px;font-size:.78rem;border-color:#fca5a5;color:#dc2626;" onclick="window.toggleAllChecks(false)">⬜ Desmarcar Todos</button>
      </div>
    </div>
    <form id="permissions-form">
      <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-3" id="modules-list-container"></div>
      <div class="admin-footer">
        <button type="button" class="btn-admin-cancel" onclick="window.recargarPermisos()">Descartar Cambios</button>
        <button type="submit" class="btn-admin-save"><i class="fas fa-save me-2"></i>Guardar Configuración</button>
      </div>
    </form>
  </div>

  <!-- Suscripciones -->
  <div id="pagos-content" style="display:none;">
    <h5 class="fw-bold mb-4" style="color:#1e293b;">💳 Control de Suscripciones</h5>
    <div class="admin-cat-card">
      <div class="table-responsive">
        <table class="sus-table" id="tabla-suscripciones">
          <thead>
            <tr>
              <th>Negocio</th>
              <th>Cuota</th>
              <th>Deuda</th>
              <th>Último Pago</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- ── Modal Registrar Pago ── -->
<div class="admin-modal-overlay" id="admin-modal-pago">
  <div class="admin-modal-box">
    <div class="admin-modal-title">
      <i class="fas fa-credit-card" style="color:#10b981;"></i>
      Registrar Pago — <span id="reg-pago-negocio-nombre-display"></span>
    </div>
    <input type="hidden" id="reg-pago-negocio-id">
    <input type="hidden" id="reg-pago-negocio-nombre">
    <div class="mb-3">
      <label class="form-label small fw-bold">Período</label>
      <div class="d-flex gap-2">
        <select id="reg-pago-mes" class="form-select" style="border-radius:10px;"></select>
        <select id="reg-pago-anio" class="form-select" style="border-radius:10px;"></select>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label small fw-bold">Monto ($)</label>
      <input type="number" id="reg-pago-monto" class="form-control" style="border-radius:10px;" min="0" step="0.01">
    </div>
    <div class="d-flex gap-2 justify-content-end">
      <button class="btn-admin-cancel" onclick="document.getElementById('admin-modal-pago').classList.remove('open')">Cancelar</button>
      <button class="btn-admin-save" onclick="window.confirmarPago()"><i class="fas fa-check me-2"></i>Confirmar Pago</button>
    </div>
  </div>
</div>

<!-- ── Modal Historial Pagos ── -->
<div class="admin-modal-overlay" id="admin-modal-historial">
  <div class="admin-modal-box" style="max-width:560px;">
    <div class="admin-modal-title">
      <i class="fas fa-history" style="color:#4f46e5;"></i>
      <span id="historial-negocio-nombre">Historial de Pagos</span>
    </div>
    <div class="table-responsive" style="max-height:340px;overflow-y:auto;">
      <table class="sus-table" style="border-radius:0;">
        <thead>
          <tr><th>Período</th><th>Monto</th><th>Fecha</th><th>Registrado por</th></tr>
        </thead>
        <tbody id="tbody-historial-pagos"></tbody>
      </table>
    </div>
    <div class="d-flex justify-content-end mt-3">
      <button class="btn-admin-cancel" onclick="document.getElementById('admin-modal-historial').classList.remove('open')">Cerrar</button>
    </div>
  </div>
</div>

</div>
