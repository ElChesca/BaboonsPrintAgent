<div class="card">
    <div class="inventario-header">
        <h2>Gestión de Unidades (Locales/Oficinas)</h2>
        <button id="btn-abrir-modal-unidad" class="btn-primary admin-only">➕ Añadir Unidad</button>
    </div>
    
    <div class="tabla-contenedor" style="margin-top: 20px;">
        <table id="tabla-unidades" class="tabla-bonita">
            <thead>
                <tr>
                    <th>Nombre (Local/Ofic.)</th>
                    <th>Piso</th>
                    <th>Inquilino</th>
                    <th>Propietario</th>
                    <th>M²</th>
                    <th>Coef. (%)</th>
                    <th class="admin-only">Acciones</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>

<div id="modal-unidad" class="modal">
    <div class="modal-content large">
        <div class="modal-header">
            <h3 id="modal-unidad-titulo">Añadir Nueva Unidad</h3>
            <span id="close-modal-unidad" class="close-button">&times;</span>
        </div>
        
        <form id="form-unidad">
            <input type="hidden" id="unidad-id">
            
            <div class="form-grid">
                <div class="form-group">
                    <label for="unidad-nombre">Nombre (Ej: "Local 1A", "Oficina 5"):</label>
                    <input type="text" id="unidad-nombre" required>
                </div>
                
                <div class="form-group">
                    <label for="unidad-piso">Piso:</label>
                    <input type="text" id="unidad-piso" placeholder="Ej: PB, Piso 1">
                </div>

                <div class="form-group">
                    <label for="unidad-metros">Metros Cuadrados (m²):</label>
                    <input type="number" id="unidad-metros" step="0.01" placeholder="Ej: 50.5">
                </div>
                
                <div class="form-group">
                    <label for="unidad-coeficiente">Coeficiente (% de Expensas):</label>
                    <input type="number" id="unidad-coeficiente" step="0.0001" placeholder="Ej: 0.0350">
                </div>

                <div class="form-group">
                    <label for="unidad-inquilino">Inquilino Asignado:</label>
                    <select id="unidad-inquilino">
                        <option value="">-- Sin Asignar --</option>
                        </select>
                </div>

                <div class="form-group">
                    <label for="unidad-propietario">Propietario Asignado:</label>
                    <select id="unidad-propietario">
                        <option value="">-- Sin Asignar --</option>
                        </select>
                </div>
            </div>

            <div class="form-group" style="margin-top: 15px;">
                <label for="unidad-descripcion">Descripción / Notas:</label>
                <textarea id="unidad-descripcion" rows="3"></textarea>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn-primary">Guardar</button>
            </div>
        </form>
    </div>
</div>
