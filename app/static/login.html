<style>
    .login-container {
        max-width: 400px;
        margin: 50px auto;
        padding: 30px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        text-align: center;
    }
    .login-container h2 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 2.5em;
        margin-bottom: 20px;
    }
    .login-container form {
        display: flex;
        flex-direction: column;
    }
    .login-container input {
        padding: 12px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 1em;
    }
    .login-container button {
        padding: 12px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1.1em;
    }
    #login-error {
        color: #721c24;
        background-color: #f8d7da;
        padding: 10px;
        border-radius: 5px;
        margin-top: 15px;
        display: none; /* Oculto por defecto */
    }
</style>

<div class="card login-card">
    <form id="form-login">
        <h2>INICIAR SESIÓN</h2>
        <div class="form-group">
            <label for="login-nombre">Usuario (Email):</label>
            <input type="text" id="login-nombre" required>
        </div>
        <div class="form-group">
            <label for="login-password">Contraseña:</label>
            <input type="password" id="login-password" required>
        </div>
        <button type="submit" class="btn-primary">Ingresar</button>
    </form>
</div>
