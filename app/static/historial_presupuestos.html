<div class="card">
    <h2>🧾 Historial de Presupuestos</h2>
    <div class="filters">
        <label>Desde:</label> <input type="date" id="fecha-desde-presupuestos">
        <label>Hasta:</label> <input type="date" id="fecha-hasta-presupuestos">
        <button id="btn-filtrar-presupuestos">Filtrar</button>
    </div>
    
    <div class="tabla-contenedor">
        <table id="tabla-historial-presupuestos" class="tabla-bonita">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Fecha</th>
                    <th>Cliente</th>
                    <th>Vendedor</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>
