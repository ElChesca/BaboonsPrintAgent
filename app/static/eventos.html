<!-- app/static/eventos.html -->
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0 text-gray-800"><i class="fas fa-calendar-star me-2"></i> Gestión de Eventos</h1>
        <button class="btn btn-primary" onclick="abrirModalNuevoEvento()">
            <i class="fas fa-plus me-1"></i> Nuevo Evento
        </button>
    </div>

    <!-- Lista de Eventos -->
    <div class="row" id="lista-eventos">
        <div class="col-12 text-center py-5">
            <i class="fas fa-spinner fa-spin fa-3x text-primary mb-3"></i>
            <p>Cargando eventos...</p>
        </div>
    </div>
</div>

<!-- Modal Nuevo Evento -->
<div class="modal" id="modal-evento" tabindex="-1" style="background: rgba(0,0,0,0.5);">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Configurar Evento</h5>
                <button type="button" class="btn-close" onclick="cerrarModalEvento()"></button>
            </div>
            <div class="modal-body">
                <form id="form-evento">
                    <div class="mb-3">
                        <label class="form-label">Título del Evento</label>
                        <input type="text" id="ev-titulo" class="form-control" placeholder="Ej: Gran Torneo Baboons"
                            required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea id="ev-descripcion" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Fecha y Hora</label>
                            <input type="datetime-local" id="ev-fecha" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Precio Arancel</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" id="ev-precio" class="form-control" step="0.01" value="0.00">
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Ubicación</label>
                        <input type="text" id="ev-ubicacion" class="form-control" placeholder="Dirección del predio">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Cupo Total</label>
                        <input type="number" id="ev-cupo" class="form-control" value="100" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="cerrarModalEvento()">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="guardarEvento()">Crear Evento</button>
            </div>
        </div>
    </div>
</div>
