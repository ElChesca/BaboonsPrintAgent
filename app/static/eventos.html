<!-- app/static/eventos.html -->
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0 text-gray-800"><i class="fas fa-calendar-star me-2"></i> Gestión de Eventos</h1>
        <div class="d-flex gap-2">
            <button class="btn btn-info text-white" onclick="copiarLinkPortero()">
                <i class="fas fa-copy me-1"></i> Copiar Link Portero
            </button>
            <button class="btn btn-primary" onclick="abrirModalNuevoEvento()">
                <i class="fas fa-plus me-1"></i> Nuevo Evento
            </button>
        </div>
    </div>

    <!-- Lista de Eventos -->
    <div class="row" id="lista-eventos">
        <div class="col-12 text-center py-5">
            <i class="fas fa-spinner fa-spin fa-3x text-primary mb-3"></i>
            <p>Cargando eventos...</p>
        </div>
    </div>
</div>

<!-- Modal Nuevo/Editar Evento -->
<div class="modal" id="modal-evento" tabindex="-1" style="background: rgba(0,0,0,0.5);">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="evento-modal-title">Configurar Evento</h5>
                <button type="button" class="btn-close" onclick="cerrarModalEvento()"></button>
            </div>
            <div class="modal-body">
                <form id="form-evento">
                    <input type="hidden" id="ev-id">
                    <div class="mb-3">
                        <label class="form-label">Título del Evento</label>
                        <input type="text" id="ev-titulo" class="form-control" placeholder="Ej: Gran Torneo Baboons" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea id="ev-descripcion" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Fecha y Hora</label>
                            <input type="datetime-local" id="ev-fecha" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Precio Arancel</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" id="ev-precio" class="form-control" step="0.01" value="0.00">
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Ubicación</label>
                        <input type="text" id="ev-ubicacion" class="form-control" placeholder="Dirección del predio">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Cupo Total</label>
                        <input type="number" id="ev-cupo" class="form-control" value="100" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-danger me-auto" id="btn-eliminar-evento" style="display:none;" onclick="eliminarEvento()">Eliminar</button>
                <button type="button" class="btn btn-secondary" onclick="cerrarModalEvento()">Cancelar</button>
                <button type="button" class="btn btn-primary" id="btn-guardar-evento" onclick="guardarEvento()">Crear Evento</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal Gestión de Inscriptos -->
<div class="modal" id="modal-inscriptos" tabindex="-1" style="background: rgba(0,0,0,0.5);">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <div class="d-flex justify-content-between align-items-center w-100 me-3">
                    <div>
                        <h5 class="modal-title" id="inscriptos-modal-title">Inscriptos al Evento</h5>
                        <small class="text-muted" id="inscriptos-count">Cargando...</small>
                    </div>
                    <button class="btn btn-sm btn-outline-success" id="btn-exportar-csv">
                        <i class="fas fa-file-csv me-1"></i> Descargar CSV
                    </button>
                </div>
                <button type="button" class="btn-close" onclick="cerrarModalInscriptos()"></button>
            </div>
            <div class="modal-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Cliente</th>
                                <th>Contacto</th>
                                <th>Pago</th>
                                <th>Monto</th>
                                <th>Ingreso</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-inscriptos-body">
                            <!-- Inscriptos via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
