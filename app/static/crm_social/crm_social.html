<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/static/css/club_gestion.css"> 
<link rel="stylesheet" href="/static/crm_social/css/crm_styles.css">

<div class="container-fluid pt-4 px-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-light text-secondary m-0">
            <i class="fas fa-users-cog text-primary me-2"></i>Gestión de CRM & Leads
        </h3>
        <button class="btn btn-outline-secondary btn-sm" id="crm-refresh-btn">
            <i class="fa fa-sync-alt me-1"></i> Actualizar
        </button>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-sm-6 col-xl-4">
            <div class="club-card p-4 text-center border-0 shadow-sm" id="crm-card-leads">
                <h6 class="text-muted text-uppercase small fw-bold">Total Leads</h6>
                <h2 class="display-5 fw-bold text-primary mb-0" id="crm-leads-metric">0</h2>
                <small class="text-success"><i class="fa fa-arrow-up me-1"></i>Actualizado</small>
            </div>
        </div>
        </div>

    <div class="club-card shadow-sm border-0">
        <div class="club-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center px-4">
            <div class="d-flex align-items-center gap-3">
                <i class="fa fa-filter text-info"></i>
                <div class="btn-group btn-group-sm" role="group" id="crm-filter-group">
                    <button type="button" class="btn btn-outline-info active" data-status="todos">Todos</button>
                    <button type="button" class="btn btn-outline-info" data-status="nuevo">Nuevos</button>
                    <button type="button" class="btn btn-outline-info" data-status="interesado">Interesados</button>
                    <button type="button" class="btn btn-outline-info" data-status="ganado">Clientes</button>
                </div>
            </div>
            <button class="btn btn-primary btn-sm rounded-pill px-3" id="crm-new-lead-btn">
                <i class="fa fa-plus me-1"></i> Nuevo Lead
            </button>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle" id="crm-leads-table">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-4">Nombre</th>
                            <th>Contacto</th>
                            <th>Estado</th>
                            <th>Origen</th>
                            <th>Fecha</th>
                            <th class="text-end pe-4">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- NEW LEAD MODAL -->
<div id="crm-lead-modal" class="crm-modal" style="display: none;">
    <div class="crm-modal-content">
        <span class="crm-close-modal">&times;</span>
        <h3 id="crm-modal-title">Nuevo Lead</h3>
        <form id="crm-lead-form">
            <input type="hidden" id="lead-id">
            <div class="crm-form-group">
                <label>Nombre *</label>
                <input type="text" id="lead-nombre" required>
            </div>
            <div class="crm-form-group">
                <label>Email</label>
                <input type="email" id="lead-email">
            </div>
            <div class="crm-form-group">
                <label>Teléfono</label>
                <input type="text" id="lead-telefono">
            </div>
            <div class="crm-form-group">
                <label>Origen</label>
                <select id="lead-origen">
                    <option value="manual">Manual</option>
                    <option value="web">Web</option>
                    <option value="instagram">Instagram</option>
                    <option value="facebook">Facebook</option>
                </select>
            </div>
            <div class="crm-form-group">
                <label>Estado</label>
                <select id="lead-estado">
                    <option value="nuevo">Nuevo</option>
                    <option value="contactado">Contactado</option>
                    <option value="interesado">Interesado</option>
                    <option value="ganado">Ganado (Cliente)</option>
                    <option value="perdido">Perdido</option>
                </select>
            </div>
            <div class="crm-form-group">
                <label>Notas</label>
                <textarea id="lead-notas"></textarea>
            </div>
            <div class="crm-form-actions">
                <button type="submit" class="crm-btn-primary">Guardar</button>
            </div>
        </form>
    </div>
</div>
