<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerebro Comercial | CRM Social Baboons</title>
    <link rel="stylesheet" href="/static/crm_social/css/crm_styles.css?v=1.9.26">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body class="bg-light">

    <div class="crm-container mt-4">
        <!-- Dashboard Header: Premium KPIs -->
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="card card-premium shadow-sm p-3 h-100">
                    <div class="d-flex align-items-center gap-3">
                        <div class="rounded-circle bg-primary bg-opacity-10 p-3">
                            <i class="fa fa-users text-primary fs-4"></i>
                        </div>
                        <div>
                            <span class="text-muted x-small fw-bold text-uppercase d-block">Leads Totales</span>
                            <h3 id="stat-total" class="mb-0 fw-bold">0</h3>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card card-premium shadow-sm p-3 h-100">
                    <div class="d-flex align-items-center gap-3">
                        <div class="rounded-circle bg-success bg-opacity-10 p-3">
                            <i class="fa fa-chart-line text-success fs-4"></i>
                        </div>
                        <div>
                            <span class="text-muted x-small fw-bold text-uppercase d-block">Tasa Conversión</span>
                            <h3 id="stat-conv" class="mb-0 fw-bold">0%</h3>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Panel de Alertas Estilo Premium -->
            <div class="col-md-6">
                <div class="card card-premium panel-calidad-premium shadow-sm p-3 h-100">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="small fw-bold text-uppercase text-primary"><i class="fa fa-shield-alt me-2"></i>Métricas de Calidad</span>
                        <span class="badge bg-soft-warning text-warning animate__animated animate__pulse animate__infinite">Falta Seguimiento</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center px-2" id="detalles-kpi">
                        <div class="text-center">
                            <small class="d-block text-muted x-small fw-bold">FRÍOS</small>
                            <span id="detail-frios" class="fs-5 fw-bold text-secondary">0</span>
                        </div>
                        <div class="vr opacity-10"></div>
                        <div class="text-center">
                            <small class="d-block text-muted x-small fw-bold">VENCIDOS</small>
                            <span id="detail-vencidos" class="fs-5 fw-bold text-danger">0</span>
                        </div>
                        <div class="vr opacity-10"></div>
                        <div class="text-center">
                            <small class="d-block text-muted x-small fw-bold">RESERVAS</small>
                            <span id="detail-reservas" class="fs-5 fw-bold text-info">0</span>
                        </div>
                        <div class="vr opacity-10"></div>
                        <div class="text-center">
                            <small class="d-block text-muted x-small fw-bold">META ADS</small>
                            <span id="detail-meta" class="fs-5 fw-bold text-success">0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Toolbar: Búsqueda y Filtros de Alta Gama -->
        <div class="card card-premium shadow-sm p-3 mb-4 bg-white">
            <div class="row g-3 align-items-center">
                <div class="col-auto">
                    <div class="search-container">
                        <div class="input-group input-group-sm">
                            <span class="input-group-text bg-light border-0"><i class="fa fa-search text-muted"></i></span>
                            <input type="text" id="crm-search" class="form-control bg-light border-0" placeholder="Buscar...">
                        </div>
                    </div>
                </div>
                <div class="col">
                    <div class="d-flex justify-content-end align-items-center gap-2">
                        <!-- Filtros de Origen (Dinámicos) -->
                        <div id="origen-filters" class="d-flex gap-2"></div>
                        
                        <div class="vr mx-1 opacity-10"></div>
                        
                        <div id="estado-filters" class="d-flex gap-2">
                            <!-- Se puebla dinámicamente -->
                        </div>

                        <div class="vr mx-1 opacity-10"></div>

                        <!-- Semáforo de Actividades -->
                        <div class="d-flex gap-2" id="actividad-filters">
                            <button class="btn btn-outline-danger btn-sm rounded-circle filter-activity" data-act="vencido" style="width:36px; height:36px;"><i class="fa fa-clock"></i></button>
                            <button class="btn btn-outline-warning btn-sm rounded-circle filter-activity" data-act="hoy" style="width:36px; height:36px;"><i class="fa fa-calendar-day"></i></button>
                            <button class="btn btn-outline-secondary btn-sm rounded-circle filter-activity" data-act="ninguna" style="width:36px; height:36px;"><i class="fa fa-ghost"></i></button>
                        </div>

                        <button class="btn btn-primary rounded-pill px-4 shadow-sm" id="btn-nuevo-lead">
                            <i class="fa fa-plus me-2"></i>Nuevo Lead
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Kanban Board: Corregido para generación dinámica -->
        <div class="kanban-board" id="kanban-wrapper">
            <!-- Los carriles SE GENERAN AQUÍ dinámicamente -->
        </div>
    </div>

    <!-- MODAL PARA CREAR/EDITAR LEAD -->
    <div class="crm-modal" id="crm-lead-modal" style="display:none;">
        <div class="crm-modal-content rounded-4 shadow-lg animate__animated animate__zoomIn">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 id="crm-modal-title" class="mb-0 fw-bold">Gestión de Lead</h4>
                <button class="btn-close-modal btn btn-light rounded-circle"><i class="fa fa-times"></i></button>
            </div>
            
            <form id="crm-lead-form">
                <input type="hidden" id="lead-id">
                <div class="row">
                    <div class="col-md-6 border-end px-4">
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted text-uppercase" style="letter-spacing: 0.05em;">Información Básica</label>
                            <div class="mb-3">
                                <label class="form-label x-small text-muted mb-1">Nombre Completo</label>
                                <input type="text" id="lead-nombre" class="form-control bg-light border-0 py-2 px-3 rounded-3" placeholder="Ej: Juan Pérez" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label x-small text-muted mb-1">Teléfono</label>
                                <input type="text" id="lead-telefono" class="form-control bg-light border-0 py-2 px-3 rounded-3" placeholder="+54 9 11 ...">
                            </div>
                            <div class="row g-3">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label x-small text-muted mb-1">Estado</label>
                                    <select id="lead-estado" class="form-select bg-light border-0 py-2 px-3 rounded-3"></select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label x-small text-muted mb-1">Origen</label>
                                    <select id="lead-origen" class="form-select bg-light border-0 py-2 px-3 rounded-3">
                                        <option value="Manual">Manual</option>
                                        <option value="Instagram">Instagram</option>
                                        <option value="WhatsApp">WhatsApp</option>
                                        <option value="Facebook">Facebook</option>
                                        <option value="Excel">Excel</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label x-small text-muted mb-1">Notas Seguimiento</label>
                                <textarea id="lead-notas" class="form-control bg-light border-0 py-2 px-3 rounded-3" rows="3" placeholder="Escribe aquí detalles importantes..."></textarea>
                            </div>
                        </div>

                        <!-- Bloque Premium de Actividad -->
                        <div class="activity-planning-premium mb-4">
                            <h6 class="small fw-bold mb-3 d-flex align-items-center">
                                <i class="fa fa-bolt me-2 text-warning"></i> PRÓXIMA ACCIÓN
                            </h6>
                            <div class="row g-2">
                                <div class="col-6">
                                    <label class="form-label x-small mb-1">Tarea</label>
                                    <select id="lead-actividad-tipo" class="form-select form-select-sm border-0 shadow-sm">
                                        <option value="">- Seleccione -</option>
                                        <option value="Llamar">Llamar 📞</option>
                                        <option value="WhatsApp">WhatsApp 💬</option>
                                        <option value="Email">Email 📧</option>
                                        <option value="Reunión">Reunión 🤝</option>
                                    </select>
                                </div>
                                <div class="col-6">
                                    <label class="form-label x-small mb-1">Fecha</label>
                                    <input type="date" id="lead-actividad-fecha" class="form-control form-control-sm border-0 shadow-sm">
                                </div>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-premium-save py-3 rounded-pill shadow">
                                <i class="fa fa-check-circle me-2"></i>GUARDAR CAMBIOS
                            </button>
                        </div>
                    </div>

                    <div class="col-md-6 px-4">
                        <h6 class="fw-bold mb-3 text-muted text-uppercase small">Timeline de Actividad</h6>
                        <div id="crm-lead-timeline" class="timeline-container overflow-auto" style="max-height: 450px;">
                            <!-- Dinámico -->
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
