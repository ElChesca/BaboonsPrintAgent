<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/static/css/club_gestion.css"> 
<link rel="stylesheet" href="/static/crm_social/css/crm_styles.css">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<div class="container-fluid pt-4 px-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-light text-secondary m-0">
            <i class="fas fa-users-cog text-primary me-2"></i>Gestión de CRM & Leads
        </h3>
        <button class="btn btn-outline-secondary btn-sm" id="crm-refresh-btn">
            <i class="fa fa-sync-alt me-1"></i> Actualizar
        </button>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-sm-6 col-xl-4">
            <div class="club-card p-4 text-center border-0 shadow-sm" id="crm-card-leads">
                <h6 class="text-muted text-uppercase small fw-bold">Total Leads</h6>
                <h2 class="display-5 fw-bold text-primary mb-0" id="crm-leads-metric">0</h2>
                <small class="text-success"><i class="fa fa-arrow-up me-1"></i>Actualizado</small>
            </div>
        </div>
        </div>
    <div class="mb-3">
        <div class="input-group shadow-sm">
            <span class="input-group-text bg-white border-end-0"><i class="fa fa-search text-muted"></i></span>
            <input type="text" id="crm-search-input" class="form-control border-start-0" placeholder="Buscar lead por nombre o teléfono...">
        </div>
    </div>
    <div class="club-card shadow-sm border-0">
        <div class="club-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center px-4">
            <div class="d-flex align-items-center gap-3">
                <i class="fa fa-filter text-info"></i>
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="btn-group btn-group-sm" role="group" id="crm-filter-group">
                        <button type="button" class="btn btn-outline-info active" data-status="todos">Todos</button>
                        <button type="button" class="btn btn-outline-info" data-status="nuevo">Nuevos</button>
                        <button type="button" class="btn btn-outline-info" data-status="interesado">Interesados</button>
                        <button type="button" class="btn btn-outline-info" data-status="ganado">Clientes</button>
                    </div>
                    
                    <div class="input-group input-group-sm" style="width: 250px;">
                        <span class="input-group-text bg-white"><i class="fa fa-search"></i></span>
                        <input type="text" id="crm-search-input" class="form-control" placeholder="Buscar por nombre...">
                    </div>
                </div> 
            </div>
            <button class="btn btn-primary btn-sm rounded-pill px-3" id="crm-new-lead-btn">
                <i class="fa fa-plus me-1"></i> Nuevo Lead
            </button>
        </div>
        <div class="card-body p-0">
            <div id="crm-kanban-container" class="mt-3">
                <div class="row g-3" id="kanban-board">
                    <div class="col-12 col-md-6 col-lg-3">
                        <div class="club-card bg-light border-0 shadow-sm h-100">
                            <div class="club-header bg-info bg-gradient py-2 px-3 d-flex justify-content-between">
                                <span><i class="fa fa-star me-2"></i>NUEVO</span>
                                <span class="badge bg-white text-info" id="count-nuevo">0</span>
                            </div>
                            <div class="kanban-column p-2" id="nuevo" style="min-height: 400px;"></div>
                        </div>
                    </div>

                    <div class="col-12 col-md-6 col-lg-3">
                        <div class="club-card bg-light border-0 shadow-sm h-100">
                            <div class="club-header bg-warning bg-gradient py-2 px-3 d-flex justify-content-between text-dark">
                                <span><i class="fa fa-phone me-2"></i>CONTACTADO</span>
                                <span class="badge bg-dark text-white" id="count-contactado">0</span>
                            </div>
                            <div class="kanban-column p-2" id="contactado" style="min-height: 400px;"></div>
                        </div>
                    </div>

                    <div class="col-12 col-md-6 col-lg-3">
                        <div class="club-card bg-light border-0 shadow-sm h-100">
                            <div class="club-header bg-primary bg-gradient py-2 px-3 d-flex justify-content-between">
                                <span><i class="fa fa-fire me-2"></i>INTERESADO</span>
                                <span class="badge bg-white text-primary" id="count-interesado">0</span>
                            </div>
                            <div class="kanban-column p-2" id="interesado" style="min-height: 400px;"></div>
                        </div>
                    </div>

                    <div class="col-12 col-md-6 col-lg-3">
                        <div class="club-card bg-light border-0 shadow-sm h-100">
                            <div class="club-header bg-success bg-gradient py-2 px-3 d-flex justify-content-between">
                                <span><i class="fa fa-check-circle me-2"></i>GANADO</span>
                                <span class="badge bg-white text-success" id="count-ganado">0</span>
                            </div>
                            <div class="kanban-column p-2" id="ganado" style="min-height: 400px;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- NEW LEAD MODAL -->
<div id="crm-lead-modal" class="crm-modal" style="display: none;">
    <div class="crm-modal-content">
        <span class="crm-close-modal">&times;</span>
        <h3 id="crm-modal-title">Nuevo Lead</h3>
        <form id="crm-lead-form">
            <input type="hidden" id="lead-id">
            <div class="crm-form-group">
                <label>Nombre *</label>
                <input type="text" id="lead-nombre" required>
            </div>
            <div class="crm-form-group">
                <label>Email</label>
                <input type="email" id="lead-email">
            </div>
            <div class="crm-form-group">
                <label>Teléfono</label>
                <input type="text" id="lead-telefono">
            </div>
            <div class="crm-form-group">
                <label>Origen</label>
                <select id="lead-origen">
                    <option value="manual">Manual</option>
                    <option value="web">Web</option>
                    <option value="instagram">Instagram</option>
                    <option value="facebook">Facebook</option>
                </select>
            </div>
            <div class="crm-form-group">
                <label>Estado</label>
                <select id="lead-estado">
                    <option value="nuevo">Nuevo</option>
                    <option value="contactado">Contactado</option>
                    <option value="interesado">Interesado</option>
                    <option value="ganado">Ganado (Cliente)</option>
                    <option value="perdido">Perdido</option>
                </select>
            </div>
            <div class="crm-form-group">
                <label>Notas</label>
                <textarea id="lead-notas"></textarea>
            </div>
            <div class="crm-form-actions">
                <button type="submit" class="crm-btn-primary">Guardar</button>
            </div>
        </form>
    </div>
</div>
