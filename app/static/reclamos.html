<div class="card">
    <div class="inventario-header">
        <h2>Gestión de Reclamos</h2>
        <button id="btn-abrir-modal-reclamo" class="btn-primary">➕ Nuevo Reclamo</button>
    </div>

    <div class="view-switcher" style="margin-top: 15px;">
        <button id="btn-vista-tabla" class="btn-secondary active">Vista Tabla</button>
        <button id="btn-vista-kanban" class="btn-secondary">Vista Kanban</button>
    </div>

    <div id="vista-tabla" class="vista-reclamos">
        <div class="form-group" style="margin-top: 15px; max-width: 300px;">
            <label for="filtro-reclamo-estado">Filtrar por estado:</label>
            <select id="filtro-reclamo-estado">
                <option value="Todos">Todos</option>
                </select>
        </div>
        <div class="tabla-contenedor" style="margin-top: 10px;">
            <table id="tabla-reclamos" class="tabla-bonita">
                <thead>
                    <tr>
                        <th>Estado</th>
                        <th>Actualizado</th>
                        <th>Unidad</th>
                        <th>Título</th>
                        <th>Msg</th>
                        <th>Creado por</th>
                        <th>Asignado a</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="vista-kanban" class="vista-reclamos" style="display: none;">
        <div class="kanban-board">
            
            <div class="kanban-column" id="columna-abierto">
                <h3>Abierto</h3>
                <div class="kanban-cards-container" id="cards-abierto">
                    </div>
            </div>
            
            <div class="kanban-column" id="columna-en-proceso">
                <h3>En Proceso</h3>
                <div class="kanban-cards-container" id="cards-en-proceso">
                    </div>
            </div>

            <div class="kanban-column" id="columna-cerrado">
                <h3>Cerrado</h3>
                <div class="kanban-cards-container" id="cards-cerrado">
                    </div>
            </div>
            
        </div>
    </div>
</div>

<div id="modal-reclamo" class="modal">
    <div class="modal-content large">
        <div class="modal-header">
            <h3 id="modal-reclamo-titulo">Nuevo Reclamo</h3>
            <span id="close-modal-reclamo" class="close-button">&times;</span>
        </div>
        
        <div class="modal-dos-columnas">
            
            <div class="columna-formulario">
                <form id="form-reclamo">
                    <input type="hidden" id="reclamo-id">
                    
                    <div class="form-group">
                        <label for="reclamo-unidad">¿Para qué Unidad es el reclamo?</label>
                        <select id="reclamo-unidad" required>
                            <option value="">-- Seleccione una unidad --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="reclamo-titulo">Título:</label>
                        <input type="text" id="reclamo-titulo" required>
                    </div>

                    <div class="form-group">
                        <label for="reclamo-descripcion">Descripción (opcional):</label>
                        <textarea id="reclamo-descripcion" rows="4"></textarea>
                    </div>
                    
                    <div class="admin-only">
                        <hr style="margin: 20px 0;">
                        <h4>Panel de Administración</h4>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="reclamo-estado">Estado:</label>
                                <select id="reclamo-estado"></select>
                            </div>
                            <div class="form-group">
                                <label for="reclamo-asignado">Asignar a:</label>
                                <select id="reclamo-asignado">
                                    <option value="">-- Sin Asignar --</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Guardar Reclamo</button>
                    </div>
                </form>
            </div>

            <div class="columna-comentarios">
                <h4>Actividad y Comentarios</h4>
                <div class="comentarios-historial" id="historial-comentarios">
                    <p>Cargando comentarios...</p>
                </div>
                <form id="form-nuevo-comentario">
                    <div class="form-group">
                        <label for="nuevo-comentario-texto">Añadir un comentario:</label>
                        <textarea id="nuevo-comentario-texto" rows="3" placeholder="Escribe tu mensaje..."></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary btn-sm">Enviar</button>
                    </div>
                </form>
            </div>
            
        </div>
    </div>
</div>
