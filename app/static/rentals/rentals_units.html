<div class="container-fluid" style="padding: 20px;">
    <div class="page-header">
        <h2>Unidades de Alquiler</h2>
        <button class="btn btn-primary" onclick="abrirModalUnidadRental()">+ Nueva Unidad</button>
    </div>
    <div class="tabla-contenedor">
        <table class="table tabla-bonita">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Tipo</th>
                    <th>Estado</th>
                    <th>Ubicación</th>
                    <th>Precio Base</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="rentals-units-table">
                <!-- Populated via JS -->
            </tbody>
        </table>
    </div>
</div>

<!-- Modal -->
<div id="modal-rental-unit" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Nueva/Editar Unidad</h3>
      <span class="close-button" onclick="cerrarModalUnidadRental()">&times;</span>
    </div>
    <form id="form-rental-unit">
        <input type="hidden" id="unit-id">
        <div class="form-group">
            <label>Nombre</label>
            <input type="text" id="unit-nombre" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Tipo</label>
            <select id="unit-tipo" class="form-control">
                <option value="Oficina">Oficina</option>
                <option value="Depósito">Depósito</option>
                <option value="Vivienda">Vivienda</option>
            </select>
        </div>
        <div class="form-group">
            <label>Estado</label>
             <select id="unit-estado" class="form-control">
                <option value="disponible">Disponible</option>
                <option value="alquilado">Alquilado</option>
                <option value="mantenimiento">Mantenimiento</option>
                <option value="limpieza">Limpieza</option>
            </select>
        </div>
        <div class="form-group">
            <label>Costo Adquisición</label>
            <input type="number" id="unit-costo" class="form-control" step="0.01">
        </div>
        <div class="form-group">
            <label>Precio Base</label>
            <input type="number" id="unit-precio" class="form-control" step="0.01">
        </div>
        <div class="form-group">
            <label>Ubicación</label>
            <input type="text" id="unit-ubicacion" class="form-control">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-success">Guardar</button>
        </div>
    </form>
  </div>
</div>
