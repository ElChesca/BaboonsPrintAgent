<div class="container-fluid" style="padding: 20px;">
    <div class="page-header">
        <h2>Contratos de Alquiler</h2>
        <button class="btn btn-primary" onclick="abrirModalContrato()">+ Nuevo Contrato</button>
    </div>
    <div class="tabla-contenedor">
        <table class="table tabla-bonita">
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>Unidad</th>
                    <th>Desde</th>
                    <th>Hasta</th>
                    <th>Estado</th>
                    <th>Monto</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="rentals-contracts-table"></tbody>
        </table>
    </div>
</div>

<!-- Modal Contrato -->
<div id="modal-rental-contract" class="modal" style="z-index: 10001; overflow-y: auto;">
    <div class="modal-content large" style="margin-top: 5vh; margin-bottom: 5vh; max-height: 90vh; overflow-y: auto;">
        <div class="modal-header">
            <h3>Nuevo Contrato</h3>
            <span class="close-button" onclick="cerrarModalContrato()">&times;</span>
        </div>
        <form id="form-rental-contract">
            <input type="hidden" id="contract-id">
            <div class="form-group">
                <label>Cliente</label>
                <select id="contract-cliente" class="form-control" required></select> <!-- Populate with Clients -->
            </div>
            <div class="form-group">
                <label>Unidad (Solo disponibles)</label>
                <select id="contract-unidad" class="form-control" required></select>
            </div>
            <div class="form-group">
                <label>Fecha Inicio</label>
                <input type="date" id="contract-inicio" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Fecha Fin</label>
                <input type="date" id="contract-fin" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Monto Mensual</label>
                <input type="number" id="contract-monto" class="form-control" step="0.01" required>
            </div>

            <!-- TRASLADO -->
            <hr>
            <h4>Traslado</h4>
            <div class="form-grid-3-col">
                <div class="form-group">
                    <label>A cargo de:</label>
                    <select id="contract-traslado-cargo" class="form-control">
                        <option value="cliente">Cliente</option>
                        <option value="empresa">Empresa (Incluido)</option>
                        <option value="bonificado">Bonificado</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Costo Estimado</label>
                    <input type="number" id="contract-traslado-costo" class="form-control" step="0.01" value="0">
                </div>
            </div>

            <!-- UBICACION -->
            <hr>
            <h4>Ubicación de Emplazamiento</h4>
            <div id="map-container" style="height: 300px; border: 1px solid #ccc; margin-bottom: 10px;"></div>
            <p class="text-muted" style="font-size: 0.9em;">Haga clic en el mapa para seleccionar la ubicación.</p>
            <input type="hidden" id="contract-lat">
            <input type="hidden" id="contract-lng">

            <!-- ARCHIVOS -->
            <hr>
            <div class="form-group">
                <label>Contrato Firmado (PDF/Foto)</label>
                <input type="file" id="contract-file" class="form-control">
            </div>
            <div class="form-group">
                <label>Fotos Estado de Entrega (Multiple)</label>
                <input type="file" id="contract-photos" class="form-control" multiple>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-success">Crear Contrato</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal Pagos -->
<div id="modal-rental-payments" class="modal">
    <div class="modal-content large">
        <div class="modal-header">
            <h3>Pagos del Contrato</h3>
            <span class="close-button" onclick="cerrarModalPagos()">&times;</span>
        </div>
        <div style="max-height: 300px; overflow-y: auto;">
            <table class="table">
                <thead>
                    <tr>
                        <th>Periodo</th>
                        <th>Pagado</th>
                        <th>Fecha</th>
                    </tr>
                </thead>
                <tbody id="payments-list-body"></tbody>
            </table>
        </div>
        <hr>
        <h4>Registrar Pago</h4>
        <form id="form-payment" style="display: flex; gap: 10px; align-items: flex-end;">
            <input type="hidden" id="payment-contract-id">
            <div class="form-group" style="flex: 1;">
                <label>Periodo (YYYY-MM)</label>
                <input type="text" id="payment-period" class="form-control" placeholder="2023-10" required>
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Monto</label>
                <input type="number" id="payment-amount" class="form-control" step="0.01" required>
            </div>
            <div class="form-group">
                <button type="submit" class="btn btn-primary">Registrar</button>
            </div>
        </form>
    </div>
</div>
