<div class.card">
    <div class="noticias-header">
        <h2>Cartelera de Comunicados</h2>
        <button id="btn-abrir-modal-noticia" class="btn-primary admin-only">➕ Nuevo Comunicado</button>
    </div>
    
    <div id="lista-noticias">
        </div>
</div>

<div id="modal-noticia" class="modal">
    <div class="modal-content large">
        <div class="modal-header">
            <h3 id="modal-noticia-titulo">Nuevo Comunicado</h3>
            <span id="close-modal-noticia" class="close-button">&times;</span>
        </div>
        
        <form id="form-noticia">
            <input type="hidden" id="noticia-id">
            
            <div class="form-group">
                <label for="noticia-titulo">Título:</label>
                <input type="text" id="noticia-titulo" required>
            </div>

            <div class="form-group">
                <label for="noticia-cuerpo">Cuerpo del Mensaje:</label>
                <textarea id="noticia-cuerpo" rows="10" required></textarea>
            </div>
            
            <div class="form-group admin-only" style="margin-top: 15px;">
                <label class="checkbox-label">
                    <input type="checkbox" id="noticia-fijado">
                    Fijar este comunicado (aparecerá siempre primero)
                </label>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn-primary">Publicar</button>
            </div>
        </form>
    </div>
</div>
