<div class="seccion-contenido-dinamico">
    <h2>💰 Reporte de Ganancias por Producto</h2>
    <div class="card filtros-card">
        <div class="filtro-grupo">
            <label for="filtro-fecha-desde-ganancias">Desde:</label>
            <input type="date" id="filtro-fecha-desde-ganancias">
        </div>
        <div class="filtro-grupo">
            <label for="filtro-fecha-hasta-ganancias">Hasta:</label>
            <input type="date" id="filtro-fecha-hasta-ganancias">
        </div>
        <div class="filtro-acciones">
            <button id="btn-filtrar-ganancias" class="btn-primary">Filtrar</button>
            <button id="btn-exportar-ganancias-pdf" class="btn-secondary">Exportar a PDF</button>
        </div>
    </div>
    <div class="card">
        <table id="tabla-reporte-ganancias" class="tabla-bonita">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Cantidad Vendida</th>
                    <th>Total Ventas</th>
                    <th>Total Costo</th>
                    <th>Ganancia Neta</th>
                </tr>
            </thead>
            <tbody></tbody>
            <tfoot>
                <tr id="fila-totales-ganancias" style="font-weight: bold; background-color: #f8f9fa;">
                    <td><strong>TOTALES</strong></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
            </tfoot>
        </table>
    </div>
</div>
