<div id="lista-principal-view">
    <div class="card">
        <div class="inventario-header">
            <h2 id="expensas-titulo">Gestión de Expensas</h2>
            <button id="btn-abrir-modal-periodo" class="btn-primary admin-only">➕ Nuevo Período</button>
        </div>
        
        <div class="tabla-contenedor" style="margin-top: 20px;">
            <table id="tabla-expensas" class="tabla-bonita">
                <thead id="tabla-expensas-head">
                    </thead>
                <tbody id="tabla-expensas-body">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<div id="detalle-periodo-view" style="display: none;">
    <div class="card">
        <div class="inventario-header">
            <div>
                <button onclick="window.volverALista()" class="btn-secondary">← Volver</button>
                <h2 id="detalle-titulo" style="margin-top: 15px;">Detalle del Período</h2>
            </div>
            <button id="btn-emitir-periodo" class="btn-primary" style="display: none;">
                Calcular y Emitir Expensas
            </button>
        </div>

        <div id="detalle-resumen" class="productos-summary">
            </div>

        <div class="tabla-contenedor" style="margin-top: 20px;">
            <table id="tabla-detalle-expensas" class="tabla-bonita">
                <thead>
                    <tr>
                        <th>Unidad</th>
                        <th>Coef.</th>
                        <th>Monto Ordinario</th>
                        <th>Monto Extra</th>
                        <th>Monto Total</th>
                        <th>Estado Pago</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-detalle-expensas-body">
                    </tbody>
            </table>
        </div>
    </div>
</div>


<div id="modal-periodo" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Nuevo Período de Expensas</h3>
            <span id="close-modal-periodo" class="close-button">&times;</span>
        </div>
        <form id="form-periodo">
            <div class="form-group">
                <label for="periodo-mes">Período (Mes y Año):</label>
                <input type="month" id="periodo-mes" required>
            </div>
            <div class="form-group">
                <label for="periodo-vencimiento">Fecha de Vencimiento:</label>
                <input type="date" id="periodo-vencimiento" required>
            </div>
            <div class="form-group">
                <label for="periodo-ordinarios">Total Gastos Ordinarios ($):</label>
                <input type="number" id="periodo-ordinarios" step="0.01" value="0.00" required>
            </div>
            <div class="form-group">
                <label for="periodo-extraordinarios">Total Gastos Extraordinarios ($):</label>
                <input type="number" id="periodo-extraordinarios" step="0.01" value="0.00" required>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn-primary">Guardar Borrador</button>
            </div>
        </form>
    </div>
</div>

<div id="modal-registrar-pago" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modal-pago-titulo">Registrar Pago</h3>
            <span id="close-modal-pago" class="close-button">&times;</span>
        </div>
        <form id="form-registrar-pago">
            <input type="hidden" id="pago-expensa-unidad-id">
            
            <p>Estás registrando un pago para:</p>
            <h4 id="pago-info-unidad"></h4>
            <p>Saldo pendiente: <strong id="pago-info-saldo"></strong></p>

            <div class="form-group">
                <label for="pago-monto">Monto a Pagar ($):</label>
                <input type="number" id="pago-monto" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="pago-notas">Notas (Ej: "Pagó en efectivo"):</label>
                <textarea id="pago-notas" rows="3"></textarea>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn-primary">Registrar Pago</button>
            </div>
        </form>
    </div>
</div>
