<!DOCTYPE html>
<html lang="es">
<head>
    </head>
<body>
    <div class="container">
        <h1>📱 Inventario Móvil</h1>

        <div class="form-group">
            <label for="negocio-selector-movil">Trabajando en el Negocio:</label>
            <select id="negocio-selector-movil">
                <option value="">Cargando negocios...</option>
                </select>
        </div>
        <hr>

        <div class="manual-entry card">
            <h3>Ingreso Manual</h3>
            <div class="form-group">
                <label for="manual-code-input">Código (SKU o Barras):</label>
                <input type="text" id="manual-code-input" placeholder="Ingrese o escanee el código...">
            </div>
            <button id="btn-buscar-manual" class="btn btn-secondary">Buscar Producto</button>
        </div>

        <div id="qr-reader" style="width: 100%; max-width: 500px; margin: 20px auto;" class="hidden"></div>
        <div id="scanner-container" class="hidden"> 
            <video id="scanner-video" playsinline></video>
            <div class="scan-marker"></div>
        </div>
        <button id="btn-start-scanner" class="btn btn-primary hidden">Iniciar Escáner</button>
        <p id="scanner-status">Seleccione un negocio para empezar.</p>

        <div id="product-info" class="card hidden">
            </div>

        <div id="error-message" class="error hidden"></div>
    </div>

    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script> 
    <script type="module" src="/static/js/modules/inventario_movil_main.js"></script>
</body>
</html>
