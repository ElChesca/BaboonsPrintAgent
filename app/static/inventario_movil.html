<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario Móvil - Multinegocio</title>
    <link rel="stylesheet" href="/static/css/inventario_movil.css">
    </head>
<body>
    <div class="container">
        <h1>📱 Inventario Móvil</h1>

        <div id="scanner-container">
            <video id="scanner-video" playsinline></video>
            <div class="scan-marker"></div>
        </div>
        <button id="btn-start-scanner" class="btn btn-primary">Iniciar Escáner</button>
        <p id="scanner-status">Apunte la cámara al código de barras...</p>

        <div id="product-info" class="card hidden">
            <h3 id="product-name"></h3>
            <p><strong>SKU:</strong> <span id="product-sku"></span></p>
            <p><strong>Stock Actual:</strong> <span id="product-stock-actual"></span></p>
            <input type="hidden" id="product-id">

            <div class="form-group">
                <label for="cantidad-nueva">Nuevo Stock Contado:</label>
                <input type="number" id="cantidad-nueva" inputmode="numeric" pattern="[0-9]*" required>
            </div>
            <button id="btn-ajustar-stock" class="btn btn-success">✅ Ajustar Stock</button>
            <button id="btn-cancelar-ajuste" type="button" class="btn btn-secondary">Cancelar</button>
        </div>

        <div id="error-message" class="error hidden"></div>
    </div>
    
    <script type="text/javascript" src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>    
    <script type="module" src="/static/js/modules/inventario_movil_main.js"></script> 
</body>
</body>
</html>
