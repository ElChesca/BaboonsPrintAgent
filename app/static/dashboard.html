<div id="seccion-dashboard" class="seccion-contenido-dinamico">
    <h2>📊 Dashboard Principal</h2>

    <!-- === NUEVO BLOQUE DE FILTROS === -->
    <div class="dashboard-filtros card" style="margin-bottom: 20px; padding: 15px; display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
        <div class="form-group" style="margin-bottom: 0;">
            <label for="fecha-desde">Desde:</label>
            <input type="date" id="fecha-desde" style="width: auto;"> 
        </div>
        <div class="form-group" style="margin-bottom: 0;">
            <label for="fecha-hasta">Hasta:</label>
            <input type="date" id="fecha-hasta" style="width: auto;">
        </div>
        <button id="btn-filtrar-dashboard" class="btn btn-primary" style="margin-top: 20px;">Aplicar Filtro</button> 
        </div>
    <!-- === FIN NUEVO BLOQUE === -->

    <div class="dashboard-stats">
        <div class="stat-card">
            <!-- Título modificado para reflejar el rango -->
            <h3>Ventas <span class="rango-fechas">(Hoy)</span></h3> 
            <p id="stat-ventas-hoy">$0.00</p>
        </div>
        <div class="stat-card">
            <h3>Productos Bajo Stock</h3>
            <p id="stat-bajo-stock">0</p>
        </div>
        <div class="stat-card">
            <h3>Total de Clientes</h3>
            <p id="stat-total-clientes">0</p>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="stat-card">
            <!-- Título modificado -->
            <h3>Ingresos por Método de Pago <span class="rango-fechas">(Últimos 30 días)</span></h3>
            <canvas id="payment-methods-chart"></canvas>
        </div>

        <div class="stat-card">
            <!-- Título modificado -->
            <h3>Top 5 Categorías <span class="rango-fechas">(Últimos 30 días)</span></h3>
            <table class="tabla-bonita">
                <thead>
                    <tr>
                        <th>Categoría</th>
                        <th>Total Vendido</th>
                    </tr>
                </thead>
                <tbody id="category-ranking-table">
                    <!-- Contenido dinámico -->
                </tbody>
            </table>
        </div>
    </div>

    <div class="actividad-reciente stat-card">
         <!-- Título modificado -->
        <h3>Actividad Reciente <span class="rango-fechas">(Hoy)</span></h3>
        <div class="tabla-contenedor">
            <table class="tabla-bonita">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Cliente</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="tabla-actividad-reciente"></tbody>
            </table>
        </div>
    </div>
</div>
