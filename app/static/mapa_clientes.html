<div class="container-fluid fade-in" style="padding: 0;">
    <!-- Mapa full screen - header flotante -->
    <div
        style="position: absolute; top: 10px; left: 60px; z-index: 1000; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.3);">
        <h4 style="margin:0;">Mapa de Clientes</h4>
        <div style="margin-top:5px; display:flex; gap:10px;">
            <select id="mapa-vendedor-filter" class="form-control form-control-sm">
                <option value="">Todos los vendedores</option>
            </select>
            <button class="btn btn-sm btn-primary" onclick="recargarMapa()">Filtrar</button>
        </div>
        <div style="margin-top: 5px;">
            <label>
                <input type="checkbox" id="toggle-zonas" checked onchange="toggleZonas()"> Ver Zonas de Vendedores
            </label>
        </div>
    </div>

    <div id="map" style="width: 100%; height: calc(100vh - 60px);"></div>
</div>
