<!-- app/static/admin_mp_dashboard.html -->
<div class="container-fluid fade-in active-module-container" id="module-mp-dashboard">
    <div class="row mb-4 align-items-center">
        <div class="col-auto">
            <h2 class="section-title mb-0">
                <i class="fas fa-wallet text-primary me-2"></i>
                Estado de Mercado Pago
            </h2>
        </div>
        <div class="col text-end">
            <button class="btn btn-outline-primary" id="btn-refresh-mp">
                <i class="fas fa-sync-alt me-1"></i> Actualizar
            </button>
        </div>
    </div>

    <!-- Balance y Estadísticas Rápidas -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="glass-card p-4 text-center h-100 border-primary shadow-sm" style="background: rgba(13, 110, 253, 0.05);">
                <span class="text-muted d-block mb-2">Saldo Disponible</span>
                <h1 class="display-5 fw-bold text-primary" id="mp-balance-total">$ --</h1>
                <p class="text-success small mb-0" id="mp-balance-detail">Cargando...</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="glass-card p-4 h-100 shadow-sm border-0">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <span class="text-muted d-block mb-1">Últimos cobros</span>
                        <h3 class="fw-bold" id="mp-recent-count">--</h3>
                    </div>
                    <div class="icon-circle bg-success-soft" style="width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(25, 135, 84, 0.1);">
                        <i class="fas fa-arrow-up text-success"></i>
                    </div>
                </div>
                <div class="mt-3">
                    <small class="text-muted">Total recolectado (últ. 10):</small>
                    <div class="fw-bold fs-5" id="mp-recent-total">$ --</div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="glass-card p-4 h-100 shadow-sm border-0">
                <span class="text-muted d-block mb-2">Estado de la cuenta</span>
                <div class="d-flex align-items-center mt-2">
                    <div class="status-indicator-pill active me-2" style="width: 10px; height: 10px; border-radius: 50%; background-color: #00c853; box-shadow: 0 0 8px #00c853;"></div>
                    <span class="fw-medium" id="mp-account-status">Conectada</span>
                </div>
                <hr class="my-3 opacity-10">
                <button class="btn btn-sm btn-outline-secondary w-100" onclick="loadContent(event, 'static/configuracion.html')">
                    Ir a Configuración <i class="fas fa-chevron-right ms-1"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Tabla de Pagos Recientes -->
    <div class="card glass-card shadow-sm border-0">
        <div class="card-header bg-transparent border-0 py-3">
            <h5 class="fw-bold mb-0">Últimas Transacciones</h5>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" id="table-mp-payments">
                    <thead class="bg-light text-muted">
                        <tr>
                            <th class="ps-4">Fecha / ID</th>
                            <th>Monto</th>
                            <th>Estado</th>
                            <th>Medio de Pago</th>
                            <th>Detalle</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-mp-payments">
                        <tr>
                            <td colspan="5" class="text-center py-5">
                                <div class="spinner-border text-primary" role="status"></div>
                                <div class="mt-2">Obteniendo datos de Mercado Pago...</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
