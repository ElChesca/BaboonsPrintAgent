<link rel="stylesheet" href="/static/css/precios_especificos.css">

<div class="card">
    <h2>💰 Gestión de Precios Específicos e Importacion de Listas</h2>

    <div class="seleccion-lista">
        <div class="form-group">
            <label for="selector-lista-precios">Seleccione la Lista de Precios a Editar:</label>
            <select id="selector-lista-precios"> /* ... opciones ... */ </select>
        </div>
        <button id="btn-abrir-modal-importar" class="btn-secondary">Importar Precios</button>
        <button id="btn-guardar-precios" class="btn-primary hidden">💾 Guardar Cambios</button>
    </div>

    </div>

<div id="modal-importar-precios" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Importar Precios desde Excel (.xlsx)</h3>
            <span id="close-modal-importar" class="close-button">&times;</span>
        </div>
        
        <p>Seleccione el archivo Excel (.xlsx) y la lista de precios a la que desea aplicar los precios importados.</p>
        <p>El archivo debe tener al menos las columnas: <strong>SKU</strong> y <strong>PRECIO</strong>.</p>
        
        <div class="form-group">
            <label for="importar-lista-destino">Aplicar a la Lista:</label>
            <select id="importar-lista-destino" required>
                <option value="">-- Seleccione una lista --</option>
                </select>
        </div>
        
        <div class="form-group">
            <label for="archivo-precios">Archivo Excel (.xlsx):</label>
            <input type="file" id="archivo-precios" accept=".xlsx" required>
        </div>
        
        <div class="form-actions">
            <button id="btn-iniciar-importacion" class="btn-primary">Iniciar Importación</button>
        </div>
        
        <div id="importar-progreso" class="hidden" style="margin-top: 20px;">
             <p>Procesando archivo... <span id="progreso-texto"></span></p>
             <progress id="progreso-barra" value="0" max="100"></progress>
             <div id="importar-resultados" style="margin-top: 10px; max-height: 200px; overflow-y: auto;"></div>
        </div>
    </div>
</div>
