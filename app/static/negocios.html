<link rel="stylesheet" href="/static/css/negocios.css">
<h2>🏢 Gestión de Negocios</h2>

<div class="card">
    <h3 id="form-negocio-titulo">Añadir Nuevo Negocio</h3>
    <form id="form-negocio">
        <input type="hidden" id="negocio-id">
        <div class="form-grid">
            <div class="form-group">
                <label for="nombre-negocio">Nombre del Negocio:</label>
                <input type="text" id="nombre-negocio" required>
            </div>
            <div class="form-group">
                <label for="direccion-negocio">Dirección:</label>
                <input type="text" id="direccion-negocio">
            </div>
            <div class="form-group">
                <label for="tipo-app-negocio">Tipo de Negocio:</label>
                <select id="tipo-app-negocio">
                    <option value="retail">Retail (Ventas/Inventario)</option>
                    <option value="consorcio">Consorcio</option>
                    <option value="rentals">Rentals (Alquileres)</option>
                    <option value="distribuidora">Distribuidora</option>
                </select>
            </div>
            <div class="form-group grid-col-span-2">
                <label for="logo-negocio">URL del Logo (Ruta estática):</label>
                <input type="text" id="logo-negocio" placeholder="/static/img/logos/mi_logo.png">
                <small style="color: #888;">Guarda la imagen en /static/img/logos/ y escribe la ruta aquí.</small>
            </div>
            <div class="form-group">
                <label for="fecha-alta-negocio">Fecha de Alta:</label>
                <input type="date" id="fecha-alta-negocio">
            </div>
            <div class="form-group">
                <label for="cuota-mensual-negocio">Cuota Mensual:</label>
                <input type="number" id="cuota-mensual-negocio" step="0.01" value="0">
            </div>
            <div class="form-group" style="display: flex; align-items: center; gap: 10px; padding-top: 25px;">
                <input type="checkbox" id="suscripcion-activa-negocio" style="width: 20px; height: 20px;">
                <label for="suscripcion-activa-negocio" style="margin: 0; cursor: pointer;"><strong>Enforzar
                        Suscripción</strong></label>
            </div>
            <div class="form-group" style="display: flex; align-items: center; gap: 10px; padding-top: 25px;">
                <input type="checkbox" id="acceso-bloqueado-negocio" style="width: 20px; height: 20px;">
                <label for="acceso-bloqueado-negocio"
                    style="margin: 0; cursor: pointer; color: #dc3545;"><strong>Bloquear Acceso al ERP
                        (Mora)</strong></label>
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-primary">Guardar</button>
            <button type="button" id="btn-cancelar-edicion-negocio" class="btn-secondary"
                style="display: none;">Cancelar</button>
        </div>
    </form>
</div>

<div class="card">
    <h3>Lista de Negocios</h3>
    <div class="tabla-contenedor">
        <table class="tabla-bonita" id="tabla-negocios">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Logo</th>
                    <th>Nombre</th>
                    <th>Tipo</th>
                    <th>Dirección</th>
                    <th>Suscripción</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>
</div>
