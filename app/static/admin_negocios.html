<div class="container-fluid fade-in" style="padding: 20px; background: #0f0f0f; min-height: 100vh; color: #e0e0e0;">
    <div class="row mb-4">
        <div class="col-12 d-flex justify-content-between align-items-center">
            <div>
                <h1 style="font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; color: #fff; margin: 0;">Panel Corporativo de Negocios</h1>
                <p style="color: #888; margin-top: 5px;">Supervisión global y gestión técnica de filiales.</p>
            </div>
            <div class="stats-glass p-3 rounded-4 d-flex align-items-center" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);">
                 <div class="text-end me-3">
                    <span class="d-block small text-muted">Total Negocios</span>
                    <strong id="total-negocios-count" class="fs-4 text-white">--</strong>
                 </div>
                 <i class="fas fa-building fs-2 text-primary opacity-50"></i>
            </div>
        </div>
    </div>

    <!-- Filtros y Perfil -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="input-group">
                <span class="input-group-text bg-dark border-secondary text-secondary"><i class="fas fa-search"></i></span>
                <input type="text" id="search-negocios" class="form-control bg-dark text-white border-secondary" placeholder="Buscar negocio por nombre o ciudad..." onkeyup="filtrarNegociosAdmin()">
            </div>
        </div>
    </div>

    <!-- Grid de Negocios -->
    <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4" id="negocios-grid">
        <!-- Tarjetas generadas dinámicamente -->
        <div class="col text-center py-5 w-100" id="loading-negocios">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2" style="color: #666;">Sincronizando filiales...</p>
        </div>
    </div>
</div>

<!-- Modal para Configuración Técnica (MP) -->
<div class="modal fade" id="modalConfigTecnica" tabindex="-1" aria-hidden="true" style="backdrop-filter: blur(8px);">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark border-secondary text-white shadow-lg" style="border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);">
            <div class="modal-header border-0 p-4 pb-2">
                <h5 class="modal-title d-flex align-items-center fw-bold" style="letter-spacing: 0.5px;">
                    <i class="fas fa-plug me-3 text-primary fs-4"></i> 
                    Gestión Mercado Pago
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 pt-0">
                <p id="modal-negocio-nombre" class="text-muted small mb-4 fw-600 text-uppercase tracking-wider"></p>
                
                <div class="alert alert-info border-0 p-3 mb-4 d-flex align-items-start" style="background: rgba(13, 110, 253, 0.08); color: #8bb9fe; border-radius: 12px; font-size: 0.85rem;">
                    <i class="fas fa-info-circle me-3 mt-1 fs-5"></i> 
                    <span>La configuración del <b>Access Token</b> es indispensable para vincular el POS de este negocio.</span>
                </div>
                
                <form id="form-config-mp">
                    <input type="hidden" id="config-negocio-id">
                    
                    <div class="mb-4">
                        <label class="form-label text-muted small text-uppercase fw-bold mb-2" style="font-size: 0.65rem; letter-spacing: 1px;">Access Token de Producción</label>
                        <div class="input-group">
                            <span class="input-group-text bg-black border-secondary text-secondary" style="border-radius: 10px 0 0 10px;"><i class="fas fa-key"></i></span>
                            <input type="password" id="mp-access-token" class="form-control bg-black text-white border-secondary" placeholder="APP_USR-XXXX-XXXX-XXXX" style="border-radius: 0; box-shadow: none;" required autocomplete="off">
                            <button class="btn btn-outline-secondary border-secondary" type="button" onclick="window.toggleMPTokenVisibility()" style="border-radius: 0 10px 10px 0;">
                                <i class="fas fa-eye" id="toggle-token-icon"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-muted small text-uppercase fw-bold mb-2" style="font-size: 0.65rem; letter-spacing: 1px;">Serial del Terminal (Point Smart)</label>
                        <div class="input-group">
                             <span class="input-group-text bg-black border-secondary text-secondary" style="border-radius: 10px 0 0 10px;"><i class="fas fa-tablet-alt"></i></span>
                             <input type="text" id="mp-device-id" class="form-control bg-black text-white border-secondary" placeholder="Seleccione o escriba el Serial..." style="border-radius: 0; box-shadow: none;">
                             <button class="btn btn-outline-primary border-secondary px-3" type="button" onclick="window.buscarDispositivosMPAdmin()" id="btn-search-mp-admin" title="Buscar dispositivos asociados al token" style="border-radius: 0 10px 10px 0; background: rgba(13, 110, 253, 0.1);">
                                <i class="fas fa-search"></i>
                             </button>
                        </div>
                        <small class="text-muted" style="font-size: 0.7rem;">Presione la lupa para buscar automáticamente.</small>
                    </div>

                    <div class="d-flex gap-2 mt-2">
                        <button type="button" class="btn flex-grow-1 py-3 d-flex align-items-center justify-content-center" onclick="window.testMPConnectionAdmin()" style="border-radius: 12px; border: 1px solid #17a2b8; background: rgba(23, 162, 184, 0.05); color: #17a2b8; font-weight: 600; transition: all 0.2s;" id="btn-test-mp">
                            <i class="fas fa-vial me-2"></i> Probar Conexión
                        </button>
                        <button type="submit" class="btn btn-primary flex-grow-1 py-3" style="border-radius: 12px; font-weight: 600; box-shadow: 0 4px 15px rgba(13, 110, 253, 0.3);">
                            <i class="fas fa-save me-2"></i> Guardar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
