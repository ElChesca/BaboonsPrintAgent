<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terminal Baboons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>    
    <link rel="stylesheet" href="/static/css/global.css">
    <style>
        body { background-color: #121212; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
        .card-custom { border-radius: 20px; overflow: hidden; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        /* 👇 ESTO ARREGLA LA POSICIÓN DE LA NOTIFICACIÓN 👇 */
        #toast-container {
            position: fixed !important;
            top: 20px !important;     /* Separado del techo */
            right: 20px !important;   /* Pegado a la DERECHA */
            left: auto !important;    /* Anula el comportamiento por defecto */
            z-index: 1055 !important; /* Por encima de todo */
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center p-3">

    <div class="row justify-content-center w-100">
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card shadow-lg border-0" style="border-radius: 20px; overflow: hidden;">
                
                <div class="card-header text-center py-4" style="background: linear-gradient(135deg, #ff6b00 0%, #e65100 100%);">
                    <div class="bg-white rounded-circle d-inline-flex align-items-center justify-content-center mb-2 shadow-sm" style="width: 60px; height: 60px;">
                        <span style="font-size: 30px;">💎</span>
                    </div>
                    <h5 class="mb-0 text-white fw-bold">Terminal Móvil</h5>
                    <small class="text-white-50">Carga de Puntos</small>
                </div>

                <div class="card-body p-4 bg-white">
                    
                    <div id="camera-container" class="mb-3 rounded-3 overflow-hidden shadow-sm bg-black" style="display:none; position: relative;">
                        <div id="reader" style="width: 100%;"></div>
                        <button type="button" id="btn-stop-camera" class="btn btn-sm btn-danger position-absolute top-0 end-0 m-2" style="z-index:999;">
                            <i class="fa fa-times"></i>
                        </button>
                        <div class="text-white text-center small py-1 w-100 position-absolute bottom-0" style="background: rgba(0,0,0,0.5);">
                            Apuntá al QR del cliente
                        </div>
                    </div>

                    <form id="form-carga-puntos">
                        <div class="mb-4">
                            <label class="form-label fw-bold small text-muted text-uppercase">1. Cliente (Scan)</label>
                            <div class="input-group input-group-lg shadow-sm rounded-3 overflow-hidden">
                                <button type="button" id="btn-start-camera" class="btn btn-dark px-3">
                                    <i class="fa fa-qrcode fa-lg"></i>
                                </button>
                                <input type="text" class="form-control border-0 bg-light" 
                                    id="cliente_identificador" placeholder="Toca el ícono QR" readonly required 
                                    style="font-weight: bold; letter-spacing: 1px;">
                            </div>
                            </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold small text-muted text-uppercase">2. Puntos</label>
                            <input type="number" class="form-control text-center fw-bold" 
                                id="cantidad" placeholder="0" required min="1" 
                                style="font-size: 3rem; color: #ff6b00; height: 80px; border-radius: 15px; background-color: #f8f9fa;">
                        </div>

                        <div class="d-grid">
                            <button type="submit" id="btn-confirmar" class="btn btn-dark btn-lg py-3 rounded-pill shadow fw-bold">
                                CONFIRMAR CARGA
                            </button>
                        </div>
                    </form>

                    <div id="resultado" class="alert mt-3 d-none text-center rounded-3 shadow-sm" role="alert"></div>
                </div>
            </div>
        </div>
    </div>

    <audio id="scan-sound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>

    </body>
</html>
