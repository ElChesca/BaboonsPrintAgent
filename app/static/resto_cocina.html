<!-- app/static/resto_cocina.html -->
<link rel="stylesheet" href="static/css/kds.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<div class="kds-app" id="kds-app">
    <!-- KDS Top Bar -->
    <header class="kds-topbar">
        <!-- Row 1: Brand & Controls -->
        <div class="kds-topbar-row">
            <div class="kds-topbar-left">
                <div class="kds-brand">
                    <div class="kds-brand-icon">
                        <i class="fas fa-fire-alt"></i>
                    </div>
                    <div class="kds-brand-text">
                        <h1 id="kds-main-title">KDS COCINA</h1>
                        <span id="kds-user-name" class="kds-user-badge">👨‍🍳 Usuario</span>
                    </div>
                </div>

                <div class="v-divider mx-2"></div>

                <div class="d-flex align-items-center gap-2">
                    <h2 id="kds-station-name" class="mb-0 fw-800 d-none d-md-block" style="font-family: 'Outfit'; letter-spacing: -0.5px; color: #fff !important;">Monitor de Producción</h2>
                </div>
            </div>

            <div class="kds-topbar-right">
                <!-- Live Counters -->
                <div class="kds-counters">
                    <div class="kds-counter">
                        <span class="kds-counter-value" id="stats-total">0</span>
                        <span class="kds-counter-label">Total</span>
                    </div>
                    <div class="kds-counter-divider"></div>
                    <div class="kds-counter kds-counter-cooking">
                        <span class="kds-counter-value" id="stats-cooking">0</span>
                        <span class="kds-counter-label">En fuego</span>
                    </div>
                </div>
                <button class="kds-btn-icon" title="Actualizar" onclick="window.cargarPendientes()">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <button class="kds-btn-icon kds-btn-logout" title="Cerrar Sesión" onclick="window.logout()">
                    <i class="fas fa-power-off"></i>
                </button>
            </div>
        </div>

        <!-- Row 2: Dynamic Filters -->
        <div class="kds-topbar-row">
            <div class="kds-filters">
                <span class="kds-filter-label"><i class="fas fa-sort"></i> ORDENAR:</span>
                <button class="kds-filter-btn active" id="btn-sort-tiempo" onclick="window.cambiarOrden('tiempo')">
                    <i class="fas fa-clock"></i> TIEMPO
                </button>
                <button class="kds-filter-btn" id="btn-sort-mesa" onclick="window.cambiarOrden('mesa')">
                    <i class="fas fa-hashtag"></i> MESA
                </button>
                
                <div class="v-divider mx-2"></div>
                
                <span class="kds-filter-label"><i class="fas fa-th"></i> VISTA:</span>
                <div class="kds-view-controls">
                    <button class="kds-view-btn" id="btn-view-grid" onclick="window.cambiarVistaKDS('grid')">
                        <i class="fas fa-th-large"></i> Grilla
                    </button>
                    <button class="kds-view-btn" id="btn-view-kanban" onclick="window.cambiarVistaKDS('kanban')">
                        <i class="fas fa-columns"></i> Kanban
                    </button>
                </div>

                <div class="v-divider mx-2"></div>

                <span class="kds-filter-label"><i class="fas fa-utensils"></i> TIEMPOS:</span>
                <div class="d-flex gap-1">
                    <button class="kds-filter-btn active" id="btn-tiempo-all" onclick="window.filtrarTiempo('all')">TODO</button>
                    <button class="kds-filter-btn" id="btn-tiempo-1" onclick="window.filtrarTiempo(1)">T1</button>
                    <button class="kds-filter-btn" id="btn-tiempo-2" onclick="window.filtrarTiempo(2)">T2</button>
                    <button class="kds-filter-btn" id="btn-tiempo-3" onclick="window.filtrarTiempo(3)">T3</button>
                </div>

                <div class="v-divider mx-2"></div>

                <button class="kds-filter-btn" id="btn-unify-tables" onclick="window.toggleUnificarMesas()">
                    <i class="fas fa-layer-group"></i> Unificar Mesas
                </button>
            </div>

            <div class="kds-topbar-right">
                <span class="kds-filter-label">BUSCAR MESA:</span>
                <input type="number" class="kds-filter-input" placeholder="Ej: 5" oninput="window.filtrarMesa(this.value)">
            </div>
        </div>
    </header>

    <!-- KDS Board -->
    <main class="kds-board" id="kds-orders-container">
        <div class="kds-empty">
            <div class="kds-empty-icon">
                <i class="fas fa-check-double"></i>
            </div>
            <h2>¡Todo al día!</h2>
            <p>No hay nuevas comandas por el momento.</p>
        </div>
    </main>
</div>
