<div class="seccion-contenido-dinamico card">
    <h2>💸 Registrar Pago a Proveedor</h2>

    <!-- Paso 1: Seleccionar Proveedor -->
    <div class="form-group">
        <label for="pago-proveedor-selector">Seleccione Proveedor:</label>
        <select id="pago-proveedor-selector">
            <option value="">-- Cargando proveedores --</option>
        </select>
    </div>

    <!-- Paso 2: Mostrar Facturas Pendientes (se llena con JS) -->
    <div id="facturas-pendientes-container" class="hidden">
        <h3>Facturas Pendientes</h3>
        <p>Seleccione las facturas a pagar e ingrese el monto a aplicar a cada una.</p>
        <div class="tabla-contenedor">
            <table id="tabla-facturas-pendientes" class="tabla-bonita">
                <thead>
                    <tr>
                        <th>Pagar</th>
                        <th>Fecha</th>
                        <th>Factura</th>
                        <th>Referencia</th>
                        <th>Total</th>
                        <th>Saldo Pendiente</th>
                        <th>Monto a Aplicar</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Las filas se agregarán aquí dinámicamente -->
                </tbody>
            </table>
        </div>
        <p><strong>Total Seleccionado: <span id="total-aplicado-display">$ 0.00</span></strong></p>
    </div>

    <!-- Paso 3: Detalles del Pago -->
    <div id="detalles-pago-container" class="hidden">
        <h3>Detalles del Pago</h3>
        <form id="form-registrar-pago">
             <div class="form-group">
                <label for="pago-fecha">Fecha del Pago:</label>
                <input type="date" id="pago-fecha" required>
            </div>
            <div class="form-group">
                <label for="pago-monto-total">Monto Total del Pago:</label>
                <!-- Usamos readonly porque se calcula de lo aplicado -->
                <input type="number" id="pago-monto-total" step="0.01" required readonly style="background-color: #eee;"> 
            </div>
            <div class="form-group">
                <label for="pago-metodo">Método de Pago:</label>
                <select id="pago-metodo" required>
                    <option value="">-- Seleccione --</option>
                    <option value="Efectivo">Efectivo</option>
                    <option value="Transferencia">Transferencia</option>
                    <option value="Cheque">Cheque</option>
                    <option value="Nota de Crédito">Nota de Crédito</option>
                </select>
            </div>
             <div class="form-group">
                <label for="pago-referencia">Referencia (Nro. Cheque, CBU, Nro. NC, etc.):</label>
                <input type="text" id="pago-referencia">
            </div>
            <div class="form-actions">
                <button type="submit" class="btn-success">Registrar Pago</button>
            </div>
        </form>
    </div>

    <!-- Mensaje si no hay facturas pendientes -->
    <div id="mensaje-no-facturas" class="hidden" style="margin-top: 20px; text-align: center; color: grey;">
        <p>Este proveedor no tiene facturas pendientes de pago.</p>
    </div>
</div>
