<div class="seccion-contenido-dinamico">
    <h2>🏷️ Gestión de Categorías</h2>
    <div class="main-grid">
        <div class="card">
            <h3 id="form-categoria-titulo">Añadir Nueva Categoría</h3>
            <form id="form-categoria">
                <input type="hidden" id="categoria-id">
                
                <div class="form-group">
                    <label for="nombre-categoria">Nombre de la Categoría:</label>
                    <input type="text" id="nombre-categoria" required>
                </div>
                
                <div class="form-group">
                    <label for="categoria-padre">Depende de (Categoría Padre):</label>
                    <select id="categoria-padre">
                        <option value="">-- Ninguna (Es una Categoría Principal) --</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Guardar</button>
                    <button type="button" id="btn-cancelar-edicion-cat" class="btn-secondary" style="display: none;">Cancelar</button>
                </div>
            </form>
        </div>
        <div class="card">
            <h3>Lista de Categorías</h3>
            <table id="tabla-categorias" class="tabla-bonita">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </div>
</div>
