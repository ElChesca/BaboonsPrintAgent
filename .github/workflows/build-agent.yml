name: Build and Release Agent

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller requests python-escpos pywin32 Pillow qrcode

    - name: Build with PyInstaller
      run: |
        # Cambio clave: se usa --noconsole para ocultar la ventana negra
        pyinstaller --onefile --noconsole --collect-all escpos --hidden-import=escpos --name "Agente_Impresion_Baboons" baboons_print_router.py

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/heads/main')
      with:
        files: dist/Agente_Impresion_Baboons.exe
        tag_name: latest-agent
        name: Latest Agent Build
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
