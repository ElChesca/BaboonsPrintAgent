name: Build and Release Agent

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller requests python-escpos pillow
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --noconsole --name "Agente_Impresion_Baboons" --hidden-import="escpos.printer" --hidden-import="tkinter" baboons_print_router.py
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest-agent
        name: "Último Agente Compilado"
        files: dist/Agente_Impresion_Baboons.exe
        make_latest: true
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
