name: Build and Release Agent

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        $ESC_PATH = python -c "import escpos, os; print(os.path.dirname(escpos.__file__))"
        pyinstaller --onefile --noconsole --name "Agente_Impresion_Baboons" --add-data "$($ESC_PATH)\capabilities.json;escpos" baboons_print_router.py

    - name: Create or Update Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest-agent
        name: "Latest Agent Build"
        body: "Versión automatizada v2.2 (Fix: capabilities.json incluido). Actualizado el ${{ github.event.head_commit.timestamp }}"
        files: dist/Agente_Impresion_Baboons.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
