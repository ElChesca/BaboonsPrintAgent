# fly.toml app configuration file
app = 'multinegociobaboons-fly'
primary_region = 'gru'

[build]
  builder = "paketobuildpacks/builder-jammy-base"
  [build.args]
    PYTHON_COMPILE = "1"
  [build.vm]
    cpu_kind = "shared"
    cpus = 1
    memory_mb = 2048

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1